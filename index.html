<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>539 滾動回測系統</title>
    <style>
        :root {
            --bg: #000; --panel: #1a1a1a; --orange: #ff8c00; --white: #fff; --gray: #a0a0a0;
        }
        body {
            background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 15px 30px 15px;
            display: flex; flex-direction: column; gap: 15px; -webkit-tap-highlight-color: transparent;
        }
        /* 1. Logbox */
        #logbox {
            background: #0a0a0a; border: 1px solid #333; border-left: 4px solid var(--orange);
            padding: 10px; font-size: 11px; color: var(--orange); height: 50px;
            overflow-y: auto; border-radius: 8px; font-family: monospace;
        }
        .panel { background: var(--panel); border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: var(--orange); display: flex; justify-content: space-between; }
        
        /* 2. Panel 1: Backtest */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: var(--gray); text-align: left; padding: 8px 2px; border-bottom: 1px solid #333; }
        td { padding: 10px 2px; border-bottom: 1px solid #262626; }
        .hit { color: var(--orange); font-weight: 900; background: rgba(255,140,0,0.1); border-radius: 3px; }
        .pred-num:hover .hit { background: var(--orange); color: #000; }
        .stars { color: var(--orange); font-weight: bold; }

        /* 3. Panel 2: Next */
        .ball-wrap { display: flex; justify-content: space-between; margin-top: 10px; }
        .ball {
            width: 40px; height: 40px; background: linear-gradient(145deg, #ff9d26, #d97700);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000; font-size: 18px; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        .loading { text-align: center; color: var(--gray); padding: 20px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="logbox">系統初始化中...</div>

    <div class="panel">
        <h2>下期預測 <span id="next-date" style="font-size:12px; color:var(--gray)"></span></h2>
        <div id="next-prediction" class="ball-wrap">
            <div class="loading">計算中...</div>
        </div>
    </div>

    <div class="panel">
        <h2>近 10 筆滾動回測</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>開獎號</th>
                        <th>預測(基於前30期)</th>
                        <th>命中</th>
                    </tr>
                </thead>
                <tbody id="backtest-body">
                    <tr><td colspan="4" class="loading">正在獲取 Google Sheet 數據...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        /**
         * ⚠️ 在此替換你的 API URL
         */
        const API_URL = 'https://script.google.com/macros/s/AKfycbyJRV2ot2w_NPl652dKaZAS5E9wM4u7mlJ59Wurp-CAj2Pf22NOFARxRYSnfAJctQZa/exec';

        const logbox = document.getElementById('logbox');
        const backtestBody = document.getElementById('backtest-body');
        const nextContainer = document.getElementById('next-prediction');

        function log(msg) {
            logbox.innerHTML += `<div>> ${msg}</div>`;
            logbox.scrollTop = logbox.scrollHeight;
        }

        // 核心演算法：滾動窗口頻率分析
        // 邏輯：傳入當前日期之前的數據，統計出現頻率最高的 5 碼
        function getRollingPrediction(historyBefore) {
            const windowSize = 30; // 只看前 30 期，這會讓每一期的預測隨時間滾動而變化
            const targetData = historyBefore.slice(-windowSize);
            
            const freq = {};
            targetData.forEach(draw => {
                draw.nums.forEach(n => {
                    freq[n] = (freq[n] || 0) + 1;
                });
            });

            return Object.keys(freq)
                .map(Number)
                .sort((a, b) => freq[b] - freq[a] || a - b)
                .slice(0, 5)
                .sort((a, b) => a - b);
        }

        async function init() {
            try {
                log("連線至 API...");
                const res = await fetch(API_URL);
                const data = await res.json();
                log(`數據讀取成功：共 ${data.length} 筆`);

                if(data.length < 10) throw new Error("數據量不足以進行回測");

                renderAll(data);
            } catch (e) {
                log(`<span style="color:red">錯誤: ${e.message}</span>`);
            }
        }

        function renderAll(allData) {
            // 1. 渲染回測 (取最後 10 筆開獎)
            backtestBody.innerHTML = '';
            const last10 = allData.slice(-10);
            
            [...last10].reverse().forEach(currentDraw => {
                // 找出該日期「之前」的所有數據
                const idx = allData.findIndex(d => d.date === currentDraw.date);
                const historyBefore = allData.slice(0, idx);
                
                // 產生該期預測
                const pred = getRollingPrediction(historyBefore);
                const hits = pred.filter(n => currentDraw.nums.includes(n));

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${currentDraw.date.slice(5)}</td>
                    <td style="letter-spacing:1px">${currentDraw.nums.map(n => n.toString().padStart(2,'0')).join(' ')}</td>
                    <td class="pred-num">${pred.map(n => 
                        `<span class="${currentDraw.nums.includes(n) ? 'hit' : ''}">${n.toString().padStart(2,'0')}</span>`
                    ).join(' ')}</td>
                    <td class="stars">${hits.length} ★</td>
                `;
                backtestBody.appendChild(tr);
            });
            log("回測表格渲染完成");

            // 2. 渲染下期
            const lastDate = new Date(allData[allData.length-1].date);
            lastDate.setDate(lastDate.getDate() + (lastDate.getDay() === 6 ? 2 : 1));
            document.getElementById('next-date').innerText = `(${lastDate.toISOString().split('T')[0]})`;

            const nextPred = getRollingPrediction(allData);
            nextContainer.innerHTML = '';
            nextPred.forEach(n => {
                const b = document.createElement('div');
                b.className = 'ball';
                b.innerText = n.toString().padStart(2, '0');
                nextContainer.appendChild(b);
            });
            log(`下期預測已產生: ${nextPred.join(', ')}`);
        }

        init();
    </script>
</body>
</html>
