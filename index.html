<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE EVO v9.31</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root { --ios-orange:#f97316; --ios-bg:#000; --ios-panel:#1c1c1e; }
body { background:var(--ios-bg); color:#fff; font-family:system-ui; }
.ios-panel { background:var(--ios-panel); border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
.hit-num { background:var(--ios-orange); padding:1px 5px; border-radius:4px; }
.grid-num { font-size:1.25rem; font-weight:800; }
.label-mini { font-size:9px; color:#f97316; font-weight:bold; }
</style>
</head>

<body class="p-4 min-h-screen flex flex-col">

<div class="flex justify-between mb-6">
<h1 class="text-xl font-black text-orange-500">EVO v9.31</h1>
<button onclick="fetchSheetData()" class="bg-orange-500 px-6 py-2 rounded-full text-black font-bold">同步資料</button>
</div>

<div id="logBox" class="ios-panel p-3 text-xs h-24 overflow-y-auto text-gray-400 mb-4">
> 系統就緒
</div>

<div class="ios-panel p-4 mb-4">
<div class="label-mini mb-2">選號</div>
<div class="grid grid-cols-4 gap-2 text-center">
<div id="p1" class="grid-num">--</div>
<div id="p2" class="grid-num">--</div>
<div id="p3" class="grid-num">--</div>
<div id="p4" class="grid-num">--</div>
<div id="p5" class="grid-num">--</div>
<div id="p6" class="grid-num">--</div>
<div id="p7" class="grid-num">--</div>
<div id="p8" class="grid-num">--</div>
</div>
</div>

<div class="ios-panel p-4 flex-grow">
<div id="hitRate" class="text-xs text-orange-400 mb-2"></div>
<table class="w-full text-xs">
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- Worker -->
<script id="worker-source" type="text/plain">
const PREDICT_COUNT = 8;

self.onmessage = (e)=>{
 const draws = e.data.payload.draws;
 if(!draws || draws.length < 36){
   log("資料不足");
   return;
 }

 log("模型啟動 v9.31");

 const best = search(draws);
 const next = predict(draws.slice(0,best.config.window), best.config);

 self.postMessage({
  type:"analysis",
  payload:{
   nextPrediction:next,
   metrics:best.metrics,
   visibleResults:best.results.slice(0,10)
  }
 });
};

function log(m){
 self.postMessage({type:"log",payload:{message:m}});
}

function search(draws){
 const configs=[
  {w:[1,1,1.3],window:36},
  {w:[1.2,1,1.1],window:48}
 ];

 let best=null;
 configs.forEach(c=>{
  const r=evaluate(draws,c);
  if(!best || r.metrics.rate2 > best.metrics.rate2){
    best={config:c,...r};
  }
 });

 return best;
}

function evaluate(draws,c){
 let hit2=0,hit3=0,hit4=0;
 const results=[];

 for(let i=0;i<draws.length-c.window-1;i++){
  const actual=draws[i];
  const train=draws.slice(i+1,i+1+c.window);

  const p=predict(train,c);
  const hitNums=p.filter(n=>actual.nums.includes(n));

  if(hitNums.length>=2)hit2++;
  if(hitNums.length>=3)hit3++;
  if(hitNums.length>=4)hit4++;

  results.push({label:actual.label,prediction:p,hits:hitNums.length,hitNums});
 }

 const d=results.length||1;
 return {
  results,
  metrics:{
   rate2:hit2/d*100,
   rate3:hit3/d*100,
   rate4:hit4/d*100
  }
 };
}

function predict(train,c){
 const score=new Map();
 for(let i=1;i<=39;i++) score.set(i,0);

 const hot=getTop(train,12,15);
 const pair=getPair(train,24,15);

 hot.forEach((n,i)=>score.set(n,score.get(n)+c.w[0]*(15-i)));
 pair.forEach((n,i)=>score.set(n,score.get(n)+c.w[2]*(15-i)));

 const sorted=[...score.entries()].sort((a,b)=>b[1]-a[1]);

 const final=[];
 for(const [num] of sorted){
  if(final.length>=PREDICT_COUNT) break;
  if(!final.some(x=>Math.abs(x-num)<=1)) final.push(num);
 }

 for(let i=1;i<=39 && final.length<PREDICT_COUNT;i++){
  if(!final.includes(i)) final.push(i);
 }

 return final.sort((a,b)=>a-b);
}

function getTop(train,depth,limit){
 const s=new Map();
 for(let i=1;i<=39;i++) s.set(i,0);

 train.slice(0,depth).forEach((d,i)=>{
  d.nums.forEach(n=>s.set(n,s.get(n)+(depth-i)));
 });

 return [...s.entries()].sort((a,b)=>b[1]-a[1]).slice(0,limit).map(x=>x[0]);
}

function getPair(train,depth,limit){
 const s=new Map();
 for(let i=1;i<=39;i++) s.set(i,0);

 const base=train[0].nums;

 base.forEach(a=>{
  train.slice(1,depth).forEach((d,i)=>{
   if(d.nums.includes(a)){
    d.nums.forEach(n=>{
     if(n!==a) s.set(n,s.get(n)+(depth-i));
    });
   }
  });
 });

 return [...s.entries()].sort((a,b)=>b[1]-a[1]).slice(0,limit).map(x=>x[0]);
}
</script>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
let worker;

function addLog(m){
 const box=document.getElementById("logBox");
 box.innerHTML+=`> ${m}<br>`;
 box.scrollTop=box.scrollHeight;
}

function ensureWorker(){
 if(worker) return worker;

 const blob=new Blob([document.getElementById("worker-source").textContent],{type:"application/javascript"});
 worker=new Worker(URL.createObjectURL(blob));

 worker.onmessage=(e)=>{
  if(e.data.type==="log") addLog(e.data.payload.message);
  if(e.data.type==="analysis") updateUI(e.data.payload);
 };

 return worker;
}

async function fetchSheetData(){
 addLog("連線中...");
 try{
  const res=await fetch(API_URL);
  let raw;

  try{
    const j=await res.json();
    raw=j.data;
  }catch{
    raw=await res.text();
  }

  const draws=raw.split("\n")
   .map(l=>l.trim())
   .filter(Boolean)
   .map(l=>({nums:l.split(/\s+/).slice(-5).map(Number)}))
   .reverse()
   .map((d,i)=>({label:`${i+1}期`,nums:d.nums}));

  addLog("資料載入完成");
  ensureWorker().postMessage({payload:{draws}});

 }catch(e){
  addLog("同步失敗");
 }
}

function updateUI(p){
 p.nextPrediction.forEach((n,i)=>{
  document.getElementById(`p${i+1}`).innerText=String(n).padStart(2,"0");
 });

 document.getElementById("hitRate").innerText=
 `2★:${p.metrics.rate2.toFixed(1)}%  3★:${p.metrics.rate3.toFixed(1)}%`;

 const rows=p.visibleResults.map(r=>{
  const hit=new Set(r.hitNums);
  return `<tr>
  <td class="text-gray-500">${r.label}</td>
  <td>${r.prediction.map(n=>hit.has(n)?`<span class="hit-num">${n}</span>`:n).join(" ")}</td>
  <td class="text-orange-500 text-right">${r.hits}</td>
  </tr>`;
 }).join("");

 document.getElementById("historyTable").innerHTML=rows;
}

ensureWorker();
</script>

</body>
</html>
