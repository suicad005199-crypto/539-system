<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>539 數據預測模擬器</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #1a1a1a;
            --primary-orange: #ff8c00;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --border-color: #333333;
        }

        /* iOS 全螢幕適配與防誤觸 */
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        /* 1. Logbox: 系統日誌 */
        #logbox {
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-orange);
            padding: 12px;
            font-size: 12px;
            color: var(--primary-orange);
            height: 50px;
            overflow-y: auto;
            border-radius: 8px;
            font-family: monospace;
            margin-top: 10px;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h2 {
            margin: 0 0 12px 0;
            font-size: 17px;
            font-weight: 600;
            color: var(--primary-orange);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 2. Panel 1: 回測資料表格 */
        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            color: var(--text-gray);
            text-align: left;
            padding: 10px 4px;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 12px 4px;
            border-bottom: 1px solid #262626;
        }

        .hit { 
            color: var(--primary-orange); 
            font-weight: 800;
            transition: all 0.2s;
        }
        /* Hover 特效 */
        .pred-cell:hover .hit {
            background: var(--primary-orange);
            color: #000;
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* 3. Panel 2: 下期預測球體 */
        .next-date { font-size: 13px; color: var(--text-gray); font-weight: normal; }
        .ball-container {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .ball {
            width: 42px;
            height: 42px;
            background: linear-gradient(145deg, #ff9d26, #d97700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(255, 140, 0, 0.3);
        }

        .stars-label { color: var(--primary-orange); font-weight: bold; }
        .loading-text { color: var(--text-gray); text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="logbox">系統啟動中...</div>

    <div class="panel">
        <h2>下期預測 <span id="next-date-label" class="next-date">---</span></h2>
        <div id="next-prediction" class="ball-container">
            <div class="loading-text">計算中...</div>
        </div>
    </div>

    <div class="panel">
        <h2>近 10 筆回測</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>開獎</th>
                        <th>預測</th>
                        <th>命中</th>
                    </tr>
                </thead>
                <tbody id="backtest-body">
                    <tr><td colspan="4" class="loading-text">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        /** * ==========================================
         * ⚠️ 注意：在此替換你的 Google Apps Script URL
         * ==========================================
         */
        const API_URL = 'https://script.google.com/macros/s/AKfycbyJRV2ot2w_NPl652dKaZAS5E9wM4u7mlJ59Wurp-CAj2Pf22NOFARxRYSnfAJctQZa/exec';

        const logbox = document.getElementById('logbox');
        const backtestBody = document.getElementById('backtest-body');
        const nextPredContainer = document.getElementById('next-prediction');

        // 更新日誌
        function updateLog(msg) {
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
            logbox.innerHTML += `<div>[${time}] ${msg}</div>`;
            logbox.scrollTop = logbox.scrollHeight;
        }

        // 計算下一個開獎日期 (排除週日)
        function calculateNextDate(lastDateStr) {
            let date = new Date(lastDateStr);
            date.setDate(date.getDate() + 1);
            if (date.getDay() === 0) { // 如果是週日
                date.setDate(date.getDate() + 1);
                updateLog("跳過週日開獎");
            }
            return date.toISOString().split('T')[0];
        }

        // 簡單預測演算法 (此處可根據需求更換為複雜逻辑)
        function generatePrediction() {
            let res = [];
            while(res.length < 5) {
                let r = Math.floor(Math.random() * 39) + 1;
                if(!res.includes(r)) res.push(r);
            }
            return res;
        }

        // 初始化資料
        async function init() {
            try {
                updateLog("開始連線 API...");
                const response = await fetch(API_URL);
                
                if (!response.ok) throw new Error("API 連線失敗");
                
                const data = await response.json();
                updateLog(`成功讀取數據：共 ${data.length} 筆`);

                // 渲染回測 (最後 10 筆)
                renderBacktest(data.slice(-10));

                // 渲染下期
                renderNextDraw(data[data.length - 1].date);

            } catch (err) {
                updateLog(`錯誤：${err.message}`);
                console.error(err);
            }
        }

        function renderBacktest(history) {
            backtestBody.innerHTML = '';
            // 反向排列，讓最新的在上面
            [...history].reverse().forEach(item => {
                const pred = generatePrediction();
                const hits = pred.filter(n => item.nums.includes(n));
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.date.slice(5)}</td>
                    <td>${item.nums.map(n => n.toString().padStart(2, '0')).join(' ')}</td>
                    <td class="pred-cell">${pred.map(n => 
                        `<span class="${item.nums.includes(n) ? 'hit' : ''}">${n.toString().padStart(2, '0')}</span>`
                    ).join(' ')}</td>
                    <td class="stars-label">${hits.length} ★</td>
                `;
                backtestBody.appendChild(tr);
            });
        }

        function renderNextDraw(lastDate) {
            const nextDate = calculateNextDate(lastDate);
            document.getElementById('next-date-label').innerText = `(${nextDate})`;
            
            const nextPred = generatePrediction().sort((a,b) => a-b);
            nextPredContainer.innerHTML = '';
            nextPred.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.innerText = num.toString().padStart(2, '0');
                nextPredContainer.appendChild(ball);
            });
            updateLog(`下期預測產出完成 (${nextDate})`);
        }

        // 啟動程式
        init();
    </script>
</body>
</html>
