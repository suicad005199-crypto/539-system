<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v8.90 ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-orange: #f97316; --ios-bg: #0b0b0e; --ios-panel: #1c1c1e; }
        body { background-color: var(--ios-bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .ios-panel { background: var(--ios-panel); border-radius: 12px; }
        .orange-glow { box-shadow: 0 0 25px rgba(249, 115, 22, 0.15); }
        .btn-active { background: var(--ios-orange); color: #000; font-weight: 700; }
        #logBox { font-variant-numeric: tabular-nums; scrollbar-width: none; }
        #logBox::-webkit-scrollbar { display: none; }
        .hit-num { color: #fff; font-weight: 900; background: #ef4444; padding: 1px 4px; border-radius: 4px; }
        .slot-dot { display: inline-flex; width: 16px; height: 16px; align-items: center; justify-content: center; border-radius: 50%; font-size: 9px; font-weight: 800; margin-right: 2px; }
        .slot-hit { background: #4ade80; color: #000; }
        .slot-miss { background: rgba(255, 255, 255, 0.05); color: #444; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">ULTIMATE <span class="text-white">EVO 8.90</span></h1>
        <button id="btnSync" onclick="fetchSheetData()" class="px-5 py-2 rounded-xl text-sm btn-active">同步資料</button>
    </div>

    <div class="ios-panel p-4 mb-4 orange-glow border border-orange-500/30">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Neural Log</label>
            <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
        <div id="logBox" class="bg-black/40 p-3 rounded-lg text-[11px] h-20 overflow-y-auto font-mono border border-white/5">
            <span class="text-gray-500">> System Ready. Waiting for sync...</span>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 border-t-2 border-orange-600">
        <label class="text-[10px] text-gray-400 font-bold uppercase mb-3 block">Current Prediction (Sorted)</label>
        <div class="grid grid-cols-5 gap-2" id="predictionGrid">
            <div class="bg-white/5 p-3 rounded-xl text-center border border-white/10"><div class="text-xl font-black text-orange-500" id="p1">--</div></div>
            <div class="bg-white/5 p-3 rounded-xl text-center border border-white/10"><div class="text-xl font-black text-orange-500" id="p2">--</div></div>
            <div class="bg-white/5 p-3 rounded-xl text-center border border-white/10"><div class="text-xl font-black text-orange-500" id="p3">--</div></div>
            <div class="bg-white/5 p-3 rounded-xl text-center border border-white/10"><div class="text-xl font-black text-orange-500" id="p4">--</div></div>
            <div class="bg-white/5 p-3 rounded-xl text-center border border-white/10"><div class="text-xl font-black text-orange-500" id="p5">--</div></div>
        </div>
    </div>

    <div class="ios-panel p-4 flex-grow overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <label class="text-[10px] text-gray-400 font-bold uppercase">Backtest Engine</label>
            <div id="hitRate" class="text-xs font-black text-green-400">WAITING...</div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-left border-collapse">
                <thead class="text-[10px] text-gray-500 uppercase border-b border-white/10">
                    <tr>
                        <th class="pb-2">Period</th>
                        <th class="pb-2">Actual</th>
                        <th class="pb-2">Prediction</th>
                        <th class="pb-2 text-right">Hits</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="text-[12px] divide-y divide-white/5 font-mono">
                    <tr><td colspan="4" class="text-center py-10 text-gray-600 italic">No data synced.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        const WINDOW_SIZE = 15; // 擴大視窗以增加特徵量

        function addLog(msg, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            logBox.innerHTML += `<span class="text-${color}">> ${msg}</span><br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function fetchSheetData() {
            addLog("Syncing with Google Cloud...", "orange-500");
            try {
                const res = await fetch(API_URL);
                const result = await res.json();
                const rawData = typeof result === "string" ? result : (result.data || "");
                if (!rawData.trim()) throw new Error("Empty Data");
                processData(rawData);
            } catch (e) {
                addLog("Sync Failed: " + e.message, "red-500");
            }
        }

        function processData(raw) {
            let draws = raw.split(/\n/).map(line => {
                const parts = line.trim().split(/\s+/);
                const nums = parts.slice(-5).map(Number).filter(n => n > 0 && n <= 39);
                return nums.length === 5 ? { label: parts[0], nums: nums.sort((a,b)=>a-b) } : null;
            }).filter(Boolean);

            if (draws.length < 20) {
                addLog("Insufficent Data", "red-500");
                return;
            }
            addLog(`Loaded ${draws.length} periods. Analyzing patterns...`, "green-500");
            runBacktest(draws.reverse());
        }

        function getWeightedPrediction(history) {
            const freq = Array(40).fill(0);
            const recent = history.slice(0, WINDOW_SIZE);
            
            // 1. 基礎頻率權重 (近期出現次數)
            recent.forEach((d, idx) => {
                d.nums.forEach(n => {
                    freq[n] += (WINDOW_SIZE - idx) * 1.5;
                });
            });

            // 2. 尾數熱度 (Last Digit Analysis)
            const tails = Array(10).fill(0);
            recent.slice(0, 5).forEach(d => d.nums.forEach(n => tails[n % 10]++));
            for(let i=1; i<=39; i++) freq[i] += tails[i % 10] * 2;

            // 3. 遺漏值加權 (冷熱平衡)
            for(let i=1; i<=39; i++) {
                let lastSeen = history.findIndex(d => d.nums.includes(i));
                if (lastSeen > 8) freq[i] += lastSeen * 0.8; // 長期未出補償
            }

            // 取前 5 名並排序
            return freq.map((s, i) => ({ n: i, s })).slice(1)
                       .sort((a,b) => b.s - a.s).slice(0, 5)
                       .map(x => x.n).sort((a,b) => a-b);
        }

        function runBacktest(history) {
            const table = document.getElementById("historyTable");
            table.innerHTML = "";
            let totalHits = 0;
            const limit = 20;

            for (let i = 0; i < limit; i++) {
                const actual = history[i];
                const training = history.slice(i + 1);
                if (training.length < WINDOW_SIZE) break;

                const pred = getWeightedPrediction(training);
                const hits = pred.filter(n => actual.nums.includes(n));
                
                totalHits += hits.length;

                table.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="py-3 text-gray-500">${actual.label}</td>
                        <td class="text-white">${actual.nums.map(n => `<span class="${hits.includes(n) ? 'text-green-400 font-bold' : ''}">${String(n).padStart(2,'0')}</span>`).join(' ')}</td>
                        <td class="text-gray-400">${pred.map(n => hits.includes(n) ? `<span class="hit-num">${String(n).padStart(2,'0')}</span>` : String(n).padStart(2,'0')).join(' ')}</td>
                        <td class="text-right font-black ${hits.length >= 2 ? 'text-orange-500' : ''}">${hits.length}</td>
                    </tr>`;
            }

            const finalPred = getWeightedPrediction(history);
            finalPred.forEach((n, idx) => document.getElementById(`p${idx+1}`).innerText = String(n).padStart(2,'0'));
            
            const avg = (totalHits / limit).toFixed(2);
            document.getElementById("hitRate").innerText = `AVG HITS: ${avg}`;
            addLog(`Optimization complete. Avg: ${avg} hits/draw`, "orange-400");
        }
    </script>
</body>
</html>
