<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-orange: #f97316; --ios-bg: #000000; --ios-panel: #1c1c1e; }
        body { background-color: var(--ios-bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }

<body class="min-h-screen flex flex-col p-4">

    <div class="ios-panel p-4 mb-4 orange-glow border border-orange-500/50">

            <div id="hitRate" class="text-[10px] font-black text-orange-500">2星/3星/4星/5星：0.0 / 0.0 / 0.0 / 0.0</div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-[12px]">
                <thead class="sticky top-0 bg-[#1c1c1e] text-gray-500 z-10">
                    <tr class="text-left border-b border-white/10">
                        <th class="pb-2">期別</th>
                        <th class="pb-2">實際開獎</th>
                        <th class="pb-2">預測號碼</th>
                        <th class="pb-2">命中點</th>
                        <th class="pb-2 text-right">命中</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="divide-y divide-white/5">
                    <tr><td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">尚未同步資料</td></tr>
                </tbody>
            </table>

    <script id="worker-source" type="text/plain">
const DISPLAY_ROWS = 10;
const BALL_COUNT = 39;

self.onmessage = (event) => {
    const { type, payload } = event.data || {};
    if (type !== "analyze") return;

    try {
        const draws = Array.isArray(payload?.draws) ? payload.draws : [];
        if (draws.length < 48) {
            throw new Error("資料不足，至少需要 48 期才能分析。");
        }

        log("Worker 已啟動，開始進行 39 號逐一打分。", "orange-500");
        const stats = buildHistoricalStats(draws);
        const best = heuristicSearch(draws, stats);
        const nextPrediction = buildPrediction(draws.slice(0, best.config.windowSize), best.config, stats);

        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.40 訊號集成版",
                config: best.config,
                configSummary: summarizeConfig(best.config),
                filterSummary: "39 號逐一打分：熱度 + 共現 + 片段相似 + 組合層篩選",
                nextPrediction,
                metrics: best.metrics,
                visibleResults: best.results.slice(0, DISPLAY_ROWS)
            }
        });
    } catch (error) {
        log(`Worker 執行失敗：${error.message}`, "red-500");
        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.40 訊號集成版",
                config: defaultConfig(),
                configSummary: "已退回預設參數",
                filterSummary: "Worker 錯誤",
                nextPrediction: [0, 0, 0, 0, 0],
                metrics: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                visibleResults: []
            }
        });
    }
};

function log(message, color) {
    self.postMessage({ type: "log", payload: { message, color } });
}

function defaultConfig() {
    return {
        windowSize: 48,
        candidatePool: 10,
        scoreWeights: { recency: 1.2, cooccurrence: 1.0, pattern: 0.9, omission: 0.7 },
        recency: { depth: 18, hotWeight: 1.9, omitThreshold: 6, omitWeight: 0.14, nearWeight: 0.18, zoneWeight: 0.16 },
        cooccurrence: { depth: 32, recentDepth: 3, overlapWeight: 0.5, tailWeight: 0.2, neighborWeight: 0.15 },
        pattern: { segment: 3, minSimilarity: 0.56, reward: 1.8, maxMatches: 6, offsetWeight: 0.35 },
        combo: { sumWeight: 0.12, oddWeight: 0.45, overlapWeight: 0.85, spreadWeight: 0.4 }
    };
}

function buildHistoricalStats(draws) {
    const sums = [];
    const oddCounts = [];
    const spreads = [];

    draws.forEach((draw) => {
        const sorted = draw.nums.slice().sort((a, b) => a - b);
        sums.push(sorted.reduce((sum, num) => sum + num, 0));
        oddCounts.push(sorted.filter((num) => num % 2 !== 0).length);
        spreads.push(sorted[sorted.length - 1] - sorted[0]);
    });

    return {
        sum: calcStats(sums),
        odd: calcStats(oddCounts),
        spread: calcStats(spreads)
    };
}

function heuristicSearch(draws, stats) {
    const windows = [36, 48, 60];
    const scoreSets = [
        { recency: 1.2, cooccurrence: 1.0, pattern: 0.9, omission: 0.7 },
        { recency: 1.0, cooccurrence: 1.2, pattern: 1.0, omission: 0.6 },
        { recency: 1.1, cooccurrence: 0.9, pattern: 1.2, omission: 0.8 }
    ];
    const recencySets = [
        { depth: 14, hotWeight: 1.7, omitThreshold: 5, omitWeight: 0.12, nearWeight: 0.14, zoneWeight: 0.12 },
        { depth: 18, hotWeight: 1.9, omitThreshold: 6, omitWeight: 0.14, nearWeight: 0.18, zoneWeight: 0.16 },
        { depth: 24, hotWeight: 1.5, omitThreshold: 7, omitWeight: 0.18, nearWeight: 0.10, zoneWeight: 0.10 }
    ];
    const cooccurrenceSets = [
        { depth: 24, recentDepth: 2, overlapWeight: 0.45, tailWeight: 0.20, neighborWeight: 0.10 },
        { depth: 32, recentDepth: 3, overlapWeight: 0.50, tailWeight: 0.20, neighborWeight: 0.15 },
        { depth: 40, recentDepth: 4, overlapWeight: 0.55, tailWeight: 0.15, neighborWeight: 0.18 }
    ];
    const patternSets = [
        { segment: 2, minSimilarity: 0.60, reward: 1.6, maxMatches: 4, offsetWeight: 0.25 },
        { segment: 3, minSimilarity: 0.56, reward: 1.8, maxMatches: 6, offsetWeight: 0.35 },
        { segment: 4, minSimilarity: 0.52, reward: 1.4, maxMatches: 5, offsetWeight: 0.25 }
    ];
    const poolSizes = [8, 10, 12];

    let best = null;
    let tested = 0;

    windows.forEach((windowSize) => {
        scoreSets.forEach((scoreWeights) => {
            recencySets.forEach((recency) => {
                cooccurrenceSets.forEach((cooccurrence) => {
                    patternSets.forEach((pattern) => {
                        poolSizes.forEach((candidatePool) => {
                            const config = {
                                windowSize,
                                candidatePool,
                                scoreWeights: { ...scoreWeights },
                                recency: { ...recency },
                                cooccurrence: { ...cooccurrence },
                                pattern: { ...pattern },
                                combo: { ...defaultConfig().combo }
                            };
                            const evaluation = evaluateConfig(draws, config, stats);
                            tested += 1;
                            if (
                                !best ||
                                evaluation.metrics.rate3 > best.metrics.rate3 ||
                                (evaluation.metrics.rate3 === best.metrics.rate3 && evaluation.metrics.rate2 > best.metrics.rate2) ||
                                (evaluation.metrics.rate3 === best.metrics.rate3 && evaluation.metrics.rate2 === best.metrics.rate2 && evaluation.metrics.objective > best.metrics.objective)
                            ) {
                                best = { config, ...evaluation };
                            }
                        });
                    });
                });
            });
        });
    });

    log(`參數搜尋完成，共測試 ${tested} 組。`, "green-500");
    log(`最佳結果：2星 ${best.metrics.rate2.toFixed(1)}%，3星 ${best.metrics.rate3.toFixed(1)}%。`, "orange-400");
    return best;
}

function evaluateConfig(draws, config, stats) {
    const results = [];
    let hit2 = 0;
    let hit3 = 0;
    let hit4 = 0;
    let hit5 = 0;
    const testCount = Math.max(0, draws.length - config.windowSize - 1);

    for (let i = 0; i < testCount; i += 1) {
        const actual = draws[i];
        const train = draws.slice(i + 1, i + 1 + config.windowSize);
        if (train.length < config.windowSize) break;

        const prediction = buildPrediction(train, config, stats);
        const hitNums = prediction.filter((num) => actual.nums.includes(num));
        const hits = hitNums.length;

        if (hits >= 2) hit2 += 1;
        if (hits >= 3) hit3 += 1;
        if (hits >= 4) hit4 += 1;
        if (hits >= 5) hit5 += 1;

        results.push({
            label: actual.label,
            actual: actual.nums,
            prediction,
            hits,
            hitNums
        });
    }

    const divisor = results.length || 1;
    const metrics = {
        rate2: (hit2 / divisor) * 100,
        rate3: (hit3 / divisor) * 100,
        rate4: (hit4 / divisor) * 100,
        rate5: (hit5 / divisor) * 100,
        objective: ((hit2 / divisor) * 10) + ((hit3 / divisor) * 50) + ((hit4 / divisor) * 200),
        testCount: results.length
    };

    return { results, metrics };
}

function buildPrediction(train, config, stats) {
    const combinedScores = buildCombinedScores(train, config);
    const candidatePool = [...combinedScores.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .slice(0, config.candidatePool)
        .map(([num]) => num);

    return selectBestCombination(candidatePool, combinedScores, train, stats, config);
}

function buildCombinedScores(train, config) {
    const recencyScores = scoreRecencyModel(train, config.recency);
    const cooccurrenceScores = scoreCooccurrenceModel(train, config.cooccurrence);
    const patternScores = scorePatternModel(train, config.pattern);
    const omissionScores = scoreOmissionModel(train, config.recency.omitThreshold, config.recency.omitWeight);

    const normalizedRecency = normalizeScores(recencyScores);
    const normalizedCooccurrence = normalizeScores(cooccurrenceScores);
    const normalizedPattern = normalizeScores(patternScores);
    const normalizedOmission = normalizeScores(omissionScores);

    const combined = new Map();
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const total =
            (normalizedRecency.get(n) * config.scoreWeights.recency) +
            (normalizedCooccurrence.get(n) * config.scoreWeights.cooccurrence) +
            (normalizedPattern.get(n) * config.scoreWeights.pattern) +
            (normalizedOmission.get(n) * config.scoreWeights.omission);
        combined.set(n, total);
    }
    return combined;
}

function scoreRecencyModel(train, cfg) {
    const scores = createScoreMap();
    const omitMap = getOmissions(train);
    const recent = train.slice(0, Math.min(cfg.depth, train.length));

    recent.forEach((draw, index) => {
        const weight = (recent.length - index) / Math.max(1, recent.length);
        const zoneCount = [0, 0, 0, 0];

        draw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.hotWeight * weight));
            if (num > 1) scores.set(num - 1, scores.get(num - 1) + (cfg.nearWeight * weight));
            if (num < BALL_COUNT) scores.set(num + 1, scores.get(num + 1) + (cfg.nearWeight * weight));
            zoneCount[getZoneIndex(num)] += 1;
        });

        zoneCount.forEach((count, zoneIndex) => {
            if (count >= 2) {
                getZoneNumbers(zoneIndex).forEach((num) => {
                    scores.set(num, scores.get(num) + (cfg.zoneWeight * weight));
                });
            }
        });
    });

    for (let n = 1; n <= BALL_COUNT; n += 1) {
        if (omitMap[n] >= cfg.omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * cfg.omitWeight));
        }
    }

    return scores;
}

function scoreCooccurrenceModel(train, cfg) {
    const scores = createScoreMap();
    const recentUnion = new Set(train.slice(0, cfg.recentDepth).flatMap((draw) => draw.nums));
    const recentTails = new Set([...recentUnion].map((num) => num % 10));
    const recentNumbers = train[0]?.nums || [];

    for (let i = 1; i < Math.min(cfg.depth, train.length); i += 1) {
        const draw = train[i];
        const overlap = draw.nums.filter((num) => recentUnion.has(num)).length;
        if (!overlap) continue;

        const prevDraw = train[i - 1];
        if (!prevDraw) continue;

        prevDraw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (overlap * cfg.overlapWeight));
            if (recentTails.has(num % 10)) {
                scores.set(num, scores.get(num) + cfg.tailWeight);
            }
            const minDistance = Math.min(...recentNumbers.map((value) => Math.abs(value - num)));
            if (minDistance <= 2) {
                scores.set(num, scores.get(num) + cfg.neighborWeight);
            }
        });
    }

    return scores;
}

function scorePatternModel(train, cfg) {
    const scores = createScoreMap();
    const recentSegment = train.slice(0, cfg.segment);
    if (recentSegment.length < cfg.segment) return scores;

    let matches = 0;
    for (let start = 1; start + cfg.segment <= train.length && matches < cfg.maxMatches; start += 1) {
        const candidateSegment = train.slice(start, start + cfg.segment);
        const similarity = compareSegments(recentSegment, candidateSegment);
        if (similarity < cfg.minSimilarity) continue;

        const followDraw = train[start - 1];
        if (!followDraw) continue;

        followDraw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.reward * similarity));
        });

        const latest = recentSegment[0].nums;
        followDraw.nums.forEach((num) => {
            const near = Math.min(...latest.map((value) => Math.abs(value - num)));
            scores.set(num, scores.get(num) + ((3 - Math.min(near, 3)) * cfg.offsetWeight));
        });

        matches += 1;
    }

    return scores;
}

function scoreOmissionModel(train, omitThreshold, omitWeight) {
    const scores = createScoreMap();
    const omitMap = getOmissions(train);
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const velocity = getOmissionVelocity(n, train);
        if (omitMap[n] >= omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * omitWeight));
        }
        scores.set(n, scores.get(n) + velocity);
    }
    return scores;
}

function selectBestCombination(candidatePool, combinedScores, train, stats, config) {
    const ordered = candidatePool.slice().sort((a, b) => (combinedScores.get(b) - combinedScores.get(a)) || a - b);
    const combos = choose(ordered, 5);
    let bestCombo = ordered.slice(0, 5).sort((a, b) => a - b);
    let bestScore = -Infinity;

    combos.forEach((combo) => {
        const sorted = combo.slice().sort((a, b) => a - b);
        const base = sorted.reduce((sum, num) => sum + combinedScores.get(num), 0);
        const penalty = evaluateComboPenalty(sorted, train, stats, config.combo);
        const total = base - penalty;
        if (total > bestScore) {
            bestScore = total;
            bestCombo = sorted;
        }
    });

    return bestCombo;
}

function evaluateComboPenalty(combo, train, stats, comboCfg) {
    const sum = combo.reduce((acc, num) => acc + num, 0);
    const oddCount = combo.filter((num) => num % 2 !== 0).length;
    const spread = combo[combo.length - 1] - combo[0];
    const overlapWithRecent = train[0].nums.filter((num) => combo.includes(num)).length;
    const repeatOverlap = maxHistoricalOverlap(combo, train);

    let penalty = 0;
    penalty += deviationPenalty(sum, stats.sum.mean, stats.sum.stdev) * comboCfg.sumWeight;
    penalty += deviationPenalty(oddCount, stats.odd.mean, stats.odd.stdev) * comboCfg.oddWeight;
    penalty += deviationPenalty(spread, stats.spread.mean, stats.spread.stdev) * comboCfg.spreadWeight;
    if (overlapWithRecent >= 4) penalty += (overlapWithRecent - 3) * comboCfg.overlapWeight;
    if (repeatOverlap >= 4) penalty += (repeatOverlap - 3) * 1.2;

    return penalty;
}

function deviationPenalty(value, mean, stdev) {
    const safeStdev = Math.max(stdev, 1);
    return Math.abs(value - mean) / safeStdev;
}

function compareSegments(a, b) {
    const aFlat = a.flatMap((draw) => draw.nums);
    const bFlat = b.flatMap((draw) => draw.nums);
    const directOverlap = aFlat.filter((num) => bFlat.includes(num)).length / Math.max(1, aFlat.length);
    const tailOverlap = aFlat.filter((num) => bFlat.some((candidate) => candidate % 10 === num % 10)).length / Math.max(1, aFlat.length);
    const zoneOverlap = aFlat.filter((num) => bFlat.some((candidate) => getZoneIndex(candidate) === getZoneIndex(num))).length / Math.max(1, aFlat.length);
    return (directOverlap * 0.5) + (tailOverlap * 0.2) + (zoneOverlap * 0.3);
}

function maxHistoricalOverlap(combo, train) {
    let maxOverlap = 0;
    train.forEach((draw) => {
        const overlap = draw.nums.filter((num) => combo.includes(num)).length;
        if (overlap > maxOverlap) maxOverlap = overlap;
    });
    return maxOverlap;
}

function createScoreMap() {
    const scores = new Map();
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        scores.set(n, 0);
    }
    return scores;
}

function normalizeScores(scoreMap) {
    const values = [...scoreMap.values()];
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = Math.max(max - min, 1e-9);
    const normalized = new Map();
    scoreMap.forEach((value, key) => {
        normalized.set(key, (value - min) / range);
    });
    return normalized;
}

function getOmissions(history) {
    const omit = {};
    for (let n = 1; n <= BALL_COUNT; n += 1) omit[n] = 0;
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        let gap = 0;
        for (const draw of history) {
            if (draw.nums.includes(n)) break;
            gap += 1;
        }
        omit[n] = gap;
    }
    return omit;
}

function getOmissionVelocity(num, history) {
    const gaps = [];
    let currentGap = 0;

    for (const draw of history) {
        if (draw.nums.includes(num)) {
            gaps.push(currentGap);
            currentGap = 0;
        } else {
            currentGap += 1;
        }
    }

    if (!gaps.length) return 0;
    const avgGap = gaps.reduce((sum, value) => sum + value, 0) / gaps.length;
    const delta = currentGap - avgGap;
    if (Math.abs(delta) <= 1) return 1.4;
    if (delta > 1) return 0.8;
    return 0.2;
}

function calcStats(values) {
    if (!values.length) return { mean: 0, stdev: 1 };
    const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
    const variance = values.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / values.length;
    return { mean, stdev: Math.sqrt(variance) };
}

function getZoneIndex(num) {
    if (num <= 10) return 0;
    if (num <= 20) return 1;
    if (num <= 30) return 2;
    return 3;
}

function getZoneNumbers(zoneIndex) {
    const ranges = [
        [1, 10],
        [11, 20],
        [21, 30],
        [31, 39]
    ];
    const [start, end] = ranges[zoneIndex];
    const nums = [];
    for (let value = start; value <= end; value += 1) nums.push(value);
    return nums;
}

function choose(items, count) {
    const results = [];
    const path = [];

    function backtrack(start) {
        if (path.length === count) {
            results.push(path.slice());
            return;
        }
        for (let i = start; i <= items.length - (count - path.length); i += 1) {
            path.push(items[i]);
            backtrack(i + 1);
            path.pop();
        }
    }

    backtrack(0);
    return results.length ? results : [items.slice(0, count)];
}

function summarizeConfig(config) {
    return [
        `Window ${config.windowSize}`,
        `Pool ${config.candidatePool}`,
        `R/C/P ${config.scoreWeights.recency.toFixed(1)}/${config.scoreWeights.cooccurrence.toFixed(1)}/${config.scoreWeights.pattern.toFixed(1)}`,
        `Seg ${config.pattern.segment}`
    ].join(" | ");
}
    </script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        let worker = null;

        function addLog(message, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            const span = document.createElement("span");
            span.className = `text-${color}`;
            span.innerHTML = `&gt; ${message}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function formatNumber(num) {
            return String(num).padStart(2, "0");
        }

        function setStatus(mode, dotClass) {
            document.getElementById("strategyMode").innerText = mode;
            document.getElementById("statusDot").className = dotClass;
        }

        function ensureWorker() {
            if (worker) return worker;

            const source = document.getElementById("worker-source").textContent;
            const blob = new Blob([source], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            worker = new Worker(url);

            worker.onmessage = (event) => {
                const { type, payload } = event.data || {};
                if (type === "log") {
                    addLog(payload.message, payload.color || "gray-500");
                    return;
                }
                if (type === "analysis") {
                    updateUI(payload);
                }
            };

            worker.onerror = (event) => {
                addLog(`Worker 執行錯誤：${event.message || "未知錯誤"}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            worker.onmessageerror = () => {
                addLog("Worker 訊息解析失敗。", "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            addLog("Worker 已建立。", "green-500");
            return worker;
        }

        async function fetchSheetData() {
            addLog("開始同步 Google Sheet 資料...", "orange-500");
            setStatus("SYNC", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                const rawData = typeof result === "string" ? result : (typeof result.data === "string" ? result.data : "");
                if (!rawData.trim()) {
                    throw new Error("API 沒有回傳可用資料。");
                }

                const lines = rawData.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
                const draws = lines
                    .map((line) => {
                        const tokens = line.split(/\s+/);
                        const nums = tokens.slice(-5).map(Number);
                        if (nums.length !== 5 || nums.some((num) => !Number.isInteger(num) || num < 1 || num > 39)) {
                            return null;
                        }
                        if (new Set(nums).size !== 5) {
                            return null;
                        }
                        return { nums };
                    })
                    .filter(Boolean)
                    .reverse()
                    .map((draw, index) => ({
                        label: `第 ${String(index + 1).padStart(3, "0")} 期`,
                        nums: draw.nums
                    }));

                if (draws.length < 36) {
                    throw new Error("有效資料不足 36 期。");
                }

                addLog(`同步完成，共載入 ${draws.length} 期。`, "green-500");
                ensureWorker().postMessage({ type: "analyze", payload: { draws } });
            } catch (error) {
                addLog(`同步失敗：${error.message}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            }
        }

        function updateUI(payload) {
            const { modelName, configSummary, filterSummary, nextPrediction, metrics, visibleResults } = payload;

            nextPrediction.forEach((num, index) => {
                document.getElementById(`p${index + 1}`).innerText = num ? formatNumber(num) : "--";
            });

            document.getElementById("hitRate").innerText =
                `2星/3星/4星/5星：${metrics.rate2.toFixed(1)} / ${metrics.rate3.toFixed(1)} / ${metrics.rate4.toFixed(1)} / ${metrics.rate5.toFixed(1)}`;

            if (metrics.rate2 < 100) {
                setStatus("警戒", "w-2 h-2 bg-red-500 rounded-full mr-1");
            } else if (metrics.rate2 === 100 && metrics.rate3 > 50) {
                setStatus("穩定", "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse");
            } else {
                setStatus("優化中", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");
            }

            document.getElementById("modelMeta").innerText =
                `${modelName} | ${configSummary} | ${filterSummary} | 回測樣本 ${metrics.testCount} 期`;

            const rows = visibleResults.length
                ? visibleResults.map((result) => {
                    const hitSet = new Set(result.hitNums);
                    const predictionHtml = result.prediction
                        .map((num) => hitSet.has(num) ? `<span class="hit-num">${formatNumber(num)}</span>` : formatNumber(num))
                        .join(" ");
                    const dotHtml = result.prediction
                        .map((num) => `<span class="slot-dot ${hitSet.has(num) ? "slot-hit" : "slot-miss"}">${hitSet.has(num) ? "●" : "○"}</span>`)
                        .join("");
                    return `
                        <tr class="border-b border-white/5">
                            <td class="py-3 text-gray-500 font-mono">${result.label}</td>
                            <td class="font-mono text-white">${result.actual.map(formatNumber).join(" ")}</td>
                            <td class="text-[11px] text-gray-400 font-mono">${predictionHtml}</td>
                            <td>${dotHtml}</td>
                            <td class="text-right font-black ${result.hits >= 3 ? "text-orange-500" : result.hits >= 2 ? "text-white" : "text-gray-500"}">${result.hits}</td>
                        </tr>
                    `;
                }).join("")
                : `<tr><td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">沒有可顯示的回測資料</td></tr>`;

            document.getElementById("historyTable").innerHTML = rows;
            addLog(`回測完成：2星 ${metrics.rate2.toFixed(1)}%，3星 ${metrics.rate3.toFixed(1)}%。`, "green-500");
            addLog(`下一期推薦：${nextPrediction.map(formatNumber).join(" ")}`, "orange-400");
        }

        ensureWorker();
    </script>
</body>
</html>
