<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>板路分析</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0f;
  --card: #111318;
  --card2: #181b23;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --gold: #f0c060;
  --gold2: #ffd980;
  --teal: #3de8c8;
  --red: #ff5f6d;
  --blue: #4fa3ff;
  --text: #e8eaf2;
  --muted: #5a6070;
  --muted2: #8890a0;
  --radius: 18px;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
}

/* ── top bar ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: env(safe-area-inset-top, 44px) 16px 0;
  background: rgba(10,11,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
  border-bottom: 0.5px solid var(--border);
}

.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 12px;
}

.topbar-title {
  font-family: var(--mono);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
}

.refresh-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--card2);
  border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted2);
  font-size: 14px;
  transition: all 0.2s;
  -webkit-user-select: none;
}
.refresh-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── tab nav ── */
.tabnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  background: rgba(10,11,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  z-index: 100;
  display: flex;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 6px;
  cursor: pointer;
  -webkit-user-select: none;
  transition: all 0.15s;
}

.tab-icon {
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-bottom: 4px;
  transition: all 0.2s;
}

.tab-label {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  transition: color 0.2s;
}

.tab-item.active .tab-icon { background: var(--gold); }
.tab-item.active .tab-label { color: var(--gold); }
.tab-item:active { opacity: 0.6; }

/* ── content area ── */
.content {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  padding-top: calc(env(safe-area-inset-top, 44px) + 56px);
  padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 52px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.panel { display: none; padding: 12px 14px; }
.panel.active { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── card base ── */
.card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
}

.card-title {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
}

.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-green { background: #3de88a; animation: pulse 2s ease-in-out infinite; }
.dot-gold { background: var(--gold); }
.dot-blue { background: var(--blue); }
.dot-red { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── PANEL 1: LOG ── */
.log-box {
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 0.68rem;
  line-height: 1.9;
  min-height: 200px;
  max-height: 360px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.log-line { display: flex; gap: 10px; }
.log-time { color: var(--muted); flex-shrink: 0; }
.log-msg { }
.log-ok { color: var(--teal); }
.log-warn { color: var(--gold); }
.log-err { color: var(--red); }
.log-info { color: var(--muted2); }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 0.65rem;
}
.pill-ok { background: rgba(61,232,138,0.1); color: #3de88a; border: 0.5px solid rgba(61,232,138,0.2); }
.pill-loading { background: rgba(240,192,96,0.1); color: var(--gold); border: 0.5px solid rgba(240,192,96,0.2); }
.pill-err { background: rgba(255,95,109,0.1); color: var(--red); border: 0.5px solid rgba(255,95,109,0.2); }

/* ── PANEL 2: PREDICTION ── */
.date-row {
  padding: 14px 16px 6px;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.date-badge {
  background: rgba(240,192,96,0.1);
  border: 0.5px solid rgba(240,192,96,0.25);
  color: var(--gold);
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-family: var(--mono);
}

.pred-section {
  padding: 8px 16px 18px;
}

.pred-label {
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.balls-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.ball {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  position: relative;
  animation: ballPop 0.4s cubic-bezier(0.34,1.56,0.64,1) backwards;
}

@keyframes ballPop {
  from { opacity:0; transform: scale(0.4); }
  to   { opacity:1; transform: scale(1); }
}

.ball-gold {
  background: radial-gradient(circle at 35% 35%, #ffe9a0, #d4922a);
  color: #2a1a00;
  box-shadow: 0 2px 12px rgba(240,192,96,0.35);
}
.ball-ghost {
  background: var(--card2);
  border: 1.5px solid var(--border2);
  color: var(--muted2);
}

.score-strip {
  margin: 14px 16px 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.score-item {
  background: var(--card2);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}

.score-num {
  font-family: var(--mono);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--teal);
}

.score-sub {
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 3px;
}

.due-list { padding: 4px 16px 14px; }
.due-row {
  display: flex;
  align-items: center;
  padding: 7px 0;
  border-bottom: 0.5px solid var(--border);
  gap: 10px;
}
.due-row:last-child { border-bottom: none; }
.due-rank { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); width: 20px; flex-shrink: 0; }
.due-num { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; width: 28px; color: var(--gold); }
.due-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.due-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold), var(--teal)); }
.due-score { font-family: var(--mono); font-size: 0.65rem; color: var(--muted2); width: 36px; text-align: right; }

/* ── PANEL 3: RECENT ── */
.recent-table { width: 100%; border-collapse: collapse; }
.recent-table th {
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-align: center;
  padding: 8px 4px;
  border-bottom: 0.5px solid var(--border);
  font-weight: 500;
}
.recent-table td {
  text-align: center;
  padding: 9px 4px;
  border-bottom: 0.5px solid rgba(255,255,255,0.03);
  font-family: var(--mono);
  font-size: 0.78rem;
}
.recent-table tr:last-child td { border-bottom: none; }
.recent-table .date-col { font-size: 0.62rem; color: var(--muted2); text-align: left; padding-left: 12px; }
.recent-table .num-cell {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 0.72rem;
  font-weight: 700;
}
.num-hi { background: rgba(240,192,96,0.15); color: var(--gold); }
.num-lo { background: rgba(61,232,200,0.1); color: var(--teal); }
.num-mid { color: var(--muted2); }
.sum-col { font-size: 0.65rem; color: var(--muted); padding-right: 12px; }

/* ── PANEL 4: 板路 ── */
.road-grid {
  padding: 10px 14px;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 3px;
}

.road-cell {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  position: relative;
}

.rc-high { background: rgba(240,192,96,0.18); color: var(--gold); border: 0.5px solid rgba(240,192,96,0.25); }
.rc-low  { background: rgba(61,232,200,0.12); color: var(--teal); border: 0.5px solid rgba(61,232,200,0.2); }
.rc-empty{ background: rgba(255,255,255,0.03); color: var(--muted); border: 0.5px solid var(--border); }

.road-legend {
  display: flex;
  gap: 16px;
  padding: 0 14px 10px;
  font-size: 0.62rem;
  color: var(--muted2);
  align-items: center;
}
.legend-swatch { width: 10px; height: 10px; border-radius: 3px; }

.freq-heatmap {
  padding: 10px 14px;
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 4px;
}

.hm-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.hm-bar-wrap {
  width: 100%;
  height: 40px;
  display: flex;
  align-items: flex-end;
}

.hm-bar {
  width: 100%;
  border-radius: 2px 2px 0 0;
  min-height: 2px;
}

.hm-num {
  font-family: var(--mono);
  font-size: 0.55rem;
  color: var(--muted);
}

.odd-even-row {
  display: flex;
  gap: 10px;
  padding: 0 14px 12px;
}

.oe-card {
  flex: 1;
  background: var(--card2);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.oe-pct {
  font-family: var(--mono);
  font-size: 1.4rem;
  font-weight: 700;
}

.oe-label { font-size: 0.62rem; color: var(--muted); margin-top: 3px; }

.oe-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin-top: 10px;
  overflow: hidden;
  position: relative;
}
.oe-fill { height: 100%; border-radius: 2px; }

.range-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 14px 14px;
}

.range-card {
  background: var(--card2);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.range-pct {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
}

.range-label { font-size: 0.58rem; color: var(--muted); margin-top: 3px; }

/* empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.8;
}
.empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-title">◈ LOTTERY RADAR</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div id="statusPill" class="status-pill pill-loading">
        <div class="dot dot-gold"></div>
        <span>等待資料</span>
      </div>
      <div class="refresh-btn" id="refreshBtn" onclick="loadData()">↻</div>
    </div>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- PANEL 1: LOG -->
  <div class="panel active" id="panel-1">
    <div class="card">
      <div class="card-header">
        <span class="card-title">系統日誌</span>
        <div class="dot dot-green"></div>
      </div>
      <div class="log-box" id="logBox">
        <div class="log-line"><span class="log-time">--:--:--</span><span class="log-info">系統初始化...</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">API 端點</span>
      </div>
      <div style="padding:12px 14px;">
        <input id="apiInput" type="url" value="https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec"
          style="width:100%;background:#0d0f14;border:0.5px solid rgba(255,255,255,0.12);border-radius:10px;color:#8890a0;font-family:'Space Mono',monospace;font-size:0.62rem;padding:10px 12px;outline:none;-webkit-appearance:none;" />
        <button onclick="loadData()" style="margin-top:10px;width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-family:'Noto Sans TC',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;">
          重新載入
        </button>
      </div>
    </div>
  </div>

  <!-- PANEL 2: PREDICTION -->
  <div class="panel" id="panel-2">
    <div id="pred-empty" class="card">
      <div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:0.78rem;">
        <div style="font-size:2rem;opacity:0.3;margin-bottom:12px;">◎</div>
        請先在「日誌」頁載入資料
      </div>
    </div>
    <div id="pred-content" style="display:none;">
      <div class="card">
        <div class="card-header">
          <span class="card-title">最後一期</span>
          <div id="lastDateBadge" class="date-badge">—</div>
        </div>
        <div class="pred-section">
          <div class="pred-label">實際號碼</div>
          <div class="balls-row" id="lastBalls"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">D+1 預測號碼</span>
          <div class="dot dot-gold"></div>
        </div>
        <div class="pred-section">
          <div class="pred-label">補償邏輯 — 超期最高</div>
          <div class="balls-row" id="predBalls"></div>
        </div>
        <div class="score-strip" id="scoreStrip">
          <div class="score-item"><div class="score-num" id="sc-sum">—</div><div class="score-sub">預測總和</div></div>
          <div class="score-item"><div class="score-num" id="sc-mid">—</div><div class="score-sub">預測中位</div></div>
          <div class="score-item"><div class="score-num" id="sc-avg">—</div><div class="score-sub">歷史均和</div></div>
        </div>
        <div style="padding:14px 16px 6px;font-size:0.62rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;">補償分數排行</div>
        <div class="due-list" id="dueList"></div>
      </div>
    </div>
  </div>

  <!-- PANEL 3: RECENT -->
  <div class="panel" id="panel-3">
    <div class="card">
      <div class="card-header">
        <span class="card-title">近 10 期記錄</span>
        <div class="dot dot-blue"></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="recent-table">
          <thead>
            <tr>
              <th style="text-align:left;padding-left:12px;">日期</th>
              <th>N1</th><th>N2</th><th>N3</th><th>N4</th><th>N5</th>
              <th style="padding-right:12px;">和</th>
            </tr>
          </thead>
          <tbody id="recentBody">
            <tr><td colspan="7" style="padding:30px;text-align:center;color:var(--muted);font-size:0.75rem;">尚無資料</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PANEL 4: 板路 -->
  <div class="panel" id="panel-4">
    <div class="card">
      <div class="card-header">
        <span class="card-title">高低板路圖</span>
        <div class="dot dot-red"></div>
      </div>
      <div class="road-legend">
        <div style="display:flex;align-items:center;gap:5px;"><div class="legend-swatch" style="background:rgba(240,192,96,0.4);border:0.5px solid rgba(240,192,96,0.5);"></div>高區 ≥20</div>
        <div style="display:flex;align-items:center;gap:5px;"><div class="legend-swatch" style="background:rgba(61,232,200,0.3);border:0.5px solid rgba(61,232,200,0.4);"></div>低區 &lt;20</div>
      </div>
      <div class="road-grid" id="roadGrid"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">頻率熱力圖</span>
      </div>
      <div class="freq-heatmap" id="freqHeatmap"></div>
      <div style="padding:4px 14px 12px;font-size:0.6rem;color:var(--muted);">號碼 1–39 出現次數分布</div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">奇偶分布</span></div>
      <div class="odd-even-row" id="oddEvenRow"></div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">區段分布</span></div>
      <div class="range-row" id="rangeRow"></div>
    </div>
  </div>

</div>

<!-- Tab Nav -->
<div class="tabnav">
  <div class="tab-item active" onclick="switchTab(1)" id="tab-1">
    <div class="tab-icon" style="font-size:16px;">◧</div>
    <div class="tab-label">日誌</div>
  </div>
  <div class="tab-item" onclick="switchTab(2)" id="tab-2">
    <div class="tab-icon" style="font-size:16px;">◈</div>
    <div class="tab-label">預測</div>
  </div>
  <div class="tab-item" onclick="switchTab(3)" id="tab-3">
    <div class="tab-icon" style="font-size:16px;">≡</div>
    <div class="tab-label">近期</div>
  </div>
  <div class="tab-item" onclick="switchTab(4)" id="tab-4">
    <div class="tab-icon" style="font-size:16px;">▦</div>
    <div class="tab-label">板路</div>
  </div>
</div>

<script>
const API_URL = () => document.getElementById('apiInput').value.trim();
const MAX_N = 39;
let allRows = [];

/* ── utils ── */
function ts() {
  return new Date().toTimeString().slice(0,8);
}

function log(msg, type='info') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${ts()}</span><span class="log-${type}">${msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function setStatus(text, type) {
  const p = document.getElementById('statusPill');
  const dotClass = type === 'ok' ? 'dot-green' : type === 'err' ? 'dot-red' : 'dot-gold';
  p.className = `status-pill pill-${type}`;
  p.innerHTML = `<div class="dot ${dotClass}"></div><span>${text}</span>`;
}

function parseRows(data) {
  if (Array.isArray(data)) return data;
  if (data.values) return data.values;
  if (data.data) return data.data;
  if (data.rows) return data.rows;
  return [];
}

function extractNums(row) {
  let nums = [];
  if (Array.isArray(row)) {
    nums = row.slice(1).map(Number).filter(n => n >= 1 && n <= MAX_N);
  } else if (typeof row === 'object') {
    for (const k of Object.keys(row)) {
      const v = Number(row[k]);
      if (!isNaN(v) && v >= 1 && v <= MAX_N) nums.push(v);
    }
  }
  return nums.slice(0, 5);
}

function extractDate(row) {
  if (Array.isArray(row)) return String(row[0]);
  if (typeof row === 'object') {
    const k = Object.keys(row)[0];
    return String(row['date'] || row['Date'] || row[k] || '');
  }
  return '';
}

/* ── data load ── */
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('載入中', 'loading');
  log('開始連接 API...', 'warn');

  try {
    const res = await fetch(API_URL());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    log(`API 回應成功`, 'ok');

    const rows = parseRows(raw);
    log(`解析到 ${rows.length} 列原始資料`, 'info');

    const valid = rows.filter(r => extractNums(r).length === 5);
    if (!valid.length) throw new Error('無法解析出有效號碼（需 5 個 1–39 數字）');

    allRows = valid;
    log(`有效期數：${valid.length} 期`, 'ok');
    log(`最後一期：${extractDate(valid[valid.length - 1])}`, 'ok');

    setStatus(`${valid.length} 期`, 'ok');
    renderAll();
    log('全部面板渲染完成 ✓', 'ok');
  } catch(e) {
    log(`錯誤：${e.message}`, 'err');
    setStatus('錯誤', 'err');
  }

  btn.classList.remove('spinning');
}

/* ── compute due scores ── */
function computeDue(rows) {
  const total = rows.length;
  const freq = new Array(MAX_N + 1).fill(0);
  const lastSeen = new Array(MAX_N + 1).fill(-1);

  rows.forEach((row, idx) => {
    extractNums(row).forEach(n => { freq[n]++; lastSeen[n] = idx; });
  });

  return Array.from({length: MAX_N}, (_, i) => {
    const n = i + 1;
    const gap = lastSeen[n] === -1 ? total : (total - 1) - lastSeen[n];
    const expected = freq[n] > 0 ? total / freq[n] : total;
    return { n, freq: freq[n], gap, expected, score: gap / expected };
  }).sort((a, b) => b.score - a.score);
}

/* ── render all ── */
function renderAll() {
  renderPrediction();
  renderRecent();
  renderRoad();
}

/* ── panel 2 ── */
function renderPrediction() {
  if (!allRows.length) return;
  document.getElementById('pred-empty').style.display = 'none';
  document.getElementById('pred-content').style.display = 'block';

  const last = allRows[allRows.length - 1];
  const lastDate = extractDate(last);
  const lastNums = extractNums(last).sort((a,b)=>a-b);

  document.getElementById('lastDateBadge').textContent = lastDate;

  document.getElementById('lastBalls').innerHTML = lastNums.map((n,i) =>
    `<div class="ball ball-ghost" style="animation-delay:${i*0.06}s">${n}</div>`
  ).join('');

  const due = computeDue(allRows);
  const top5 = due.slice(0, 5).map(x => x.n).sort((a,b)=>a-b);

  document.getElementById('predBalls').innerHTML = top5.map((n,i) =>
    `<div class="ball ball-gold" style="animation-delay:${i*0.07}s">${n}</div>`
  ).join('');

  const sum = top5.reduce((a,b)=>a+b,0);
  const mid = top5[2];
  const allSums = allRows.map(r => extractNums(r).reduce((a,b)=>a+b,0));
  const avgSum = Math.round(allSums.reduce((a,b)=>a+b,0)/allSums.length);

  document.getElementById('sc-sum').textContent = sum;
  document.getElementById('sc-mid').textContent = mid;
  document.getElementById('sc-avg').textContent = avgSum;

  const maxScore = due[0].score;
  document.getElementById('dueList').innerHTML = due.slice(0, 8).map((d, i) => {
    const pct = Math.round(d.score / maxScore * 100);
    const isTop = i < 5;
    return `<div class="due-row">
      <div class="due-rank">#${i+1}</div>
      <div class="due-num" style="${isTop?'color:var(--gold)':'color:var(--muted2)'}">${d.n}</div>
      <div class="due-bar-wrap"><div class="due-bar" style="width:${pct}%"></div></div>
      <div class="due-score">${d.score.toFixed(2)}</div>
    </div>`;
  }).join('');
}

/* ── panel 3 ── */
function renderRecent() {
  if (!allRows.length) return;
  const recent = allRows.slice(-10).reverse();

  const allNums = allRows.flatMap(r => extractNums(r));
  const freq = {};
  allNums.forEach(n => { freq[n] = (freq[n]||0)+1; });
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const hotSet = new Set(sorted.slice(0,8).map(x=>+x[0]));
  const coldSet = new Set(sorted.slice(-8).map(x=>+x[0]));

  document.getElementById('recentBody').innerHTML = recent.map(row => {
    const date = extractDate(row);
    const nums = extractNums(row).sort((a,b)=>a-b);
    const sum = nums.reduce((a,b)=>a+b,0);
    const cells = nums.map(n => {
      const cls = hotSet.has(n) ? 'num-hi' : coldSet.has(n) ? 'num-lo' : 'num-mid';
      return `<td><span class="num-cell ${cls}">${n}</span></td>`;
    }).join('');
    return `<tr><td class="date-col">${date.slice(5)||date}</td>${cells}<td class="sum-col">${sum}</td></tr>`;
  }).join('');
}

/* ── panel 4 ── */
function renderRoad() {
  if (!allRows.length) return;

  // road map: each number in each draw classified high/low
  const allFlat = allRows.flatMap(r => extractNums(r));
  const roadGrid = document.getElementById('roadGrid');
  roadGrid.innerHTML = allFlat.slice(-60).map(n => {
    const hi = n >= 20;
    return `<div class="road-cell ${hi?'rc-high':'rc-low'}">${n}</div>`;
  }).join('');

  // heatmap
  const freq = new Array(MAX_N+1).fill(0);
  allFlat.forEach(n => freq[n]++);
  const maxF = Math.max(...freq.slice(1));
  document.getElementById('freqHeatmap').innerHTML = Array.from({length:MAX_N},(_,i)=>{
    const n = i+1;
    const h = maxF>0 ? Math.round(freq[n]/maxF*38):0;
    const alpha = 0.15 + (freq[n]/maxF)*0.65;
    return `<div class="hm-cell">
      <div class="hm-bar-wrap"><div class="hm-bar" style="height:${h}px;background:rgba(240,192,96,${alpha.toFixed(2)});"></div></div>
      <div class="hm-num">${n}</div>
    </div>`;
  }).join('');

  // odd/even
  const odd = allFlat.filter(n=>n%2===1).length;
  const even = allFlat.length - odd;
  const oddPct = Math.round(odd/allFlat.length*100);
  const evenPct = 100 - oddPct;
  document.getElementById('oddEvenRow').innerHTML = `
    <div class="oe-card">
      <div class="oe-pct" style="color:var(--gold)">${oddPct}%</div>
      <div class="oe-label">奇數</div>
      <div class="oe-bar"><div class="oe-fill" style="width:${oddPct}%;background:var(--gold);"></div></div>
    </div>
    <div class="oe-card">
      <div class="oe-pct" style="color:var(--teal)">${evenPct}%</div>
      <div class="oe-label">偶數</div>
      <div class="oe-bar"><div class="oe-fill" style="width:${evenPct}%;background:var(--teal);"></div></div>
    </div>
  `;

  // range
  const r1 = allFlat.filter(n=>n<=13).length;
  const r2 = allFlat.filter(n=>n>=14&&n<=26).length;
  const r3 = allFlat.filter(n=>n>=27).length;
  const tot = allFlat.length;
  document.getElementById('rangeRow').innerHTML = [
    {label:'1–13 低區', val:r1, color:'var(--teal)'},
    {label:'14–26 中區', val:r2, color:'var(--gold)'},
    {label:'27–39 高區', val:r3, color:'var(--red)'},
  ].map(({label,val,color})=>`
    <div class="range-card">
      <div class="range-pct" style="color:${color}">${Math.round(val/tot*100)}%</div>
      <div class="range-label">${label}</div>
    </div>
  `).join('');
}

/* ── tab switch ── */
function switchTab(n) {
  [1,2,3,4].forEach(i => {
    document.getElementById(`panel-${i}`).classList.toggle('active', i===n);
    document.getElementById(`tab-${i}`).classList.toggle('active', i===n);
  });
}

/* ── init ── */
window.onload = () => {
  log('Lottery Radar 啟動', 'ok');
  log('點擊「重新載入」或至日誌頁按鈕開始', 'info');
  loadData();
};
