    <script id="worker-source" type="text/plain">
const DISPLAY_ROWS = 10;

self.onmessage = (event) => {
    const { type, payload } = event.data || {};
    if (type !== "analyze") return;

    try {
        const draws = Array.isArray(payload?.draws) ? payload.draws : [];
        if (draws.length < 36) {
            throw new Error("資料不足，至少需要 36 期才能分析。");
        }

        log("Worker 已啟動，開始進行嚴格滾動回測。", "orange-500");
        const stats = buildHistoricalStats(draws);
        const best = heuristicSearch(draws, stats);
        const nextPrediction = buildPrediction(draws.slice(0, best.config.windowSize), best.config);

        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.20 中文強化版",
                config: best.config,
                configSummary: summarizeConfig(best.config),
                filterSummary: "投票模型：熱號 + Slot + 遺漏速度",
                nextPrediction,
                metrics: best.metrics,
                visibleResults: best.results.slice(0, DISPLAY_ROWS)
            }
        });
    } catch (error) {
        log(`Worker 執行失敗：${error.message}`, "red-500");
        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.20 中文強化版",
                config: defaultConfig(),
                configSummary: "已退回預設參數",
                filterSummary: "Worker 錯誤",
                nextPrediction: [0, 0, 0, 0, 0],
                metrics: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                visibleResults: []
            }
        });
    }
};

function log(message, color) {
    self.postMessage({ type: "log", payload: { message, color } });
}

function defaultConfig() {
    return {
        windowSize: 36,
        wa: 1.2,
        wb: 1.2,
        wc: 0.8,
        a: { depth: 10, hot: 2.0, omitThreshold: 5, omitWeight: 0.20, recentDepth: 3, recentWeight: 1.0, nearWeight: 0.3 },
        b: { depth: 16, slotWeight: 2.6, omitThreshold: 6, omitWeight: 0.15, nearRange: 4, nearWeight: 0.4, anchorWeight: 2.0 },
        c: { depth: 8, hot: 2.0, omitThreshold: 5, omitWeight: 0.15, velocityWeight: 0.8 }
    };
}

function buildHistoricalStats(draws) {
    const omissionSums = [];
    for (let i = 0; i < Math.max(0, draws.length - 1); i += 1) {
        const train = draws.slice(i + 1);
        if (train.length < 5) continue;
        const omitMap = getOmissions(train);
        const omissionSum = draws[i].nums.reduce((sum, num) => sum + omitMap[num], 0);
        omissionSums.push(omissionSum);
    }
    const mean = omissionSums.length ? omissionSums.reduce((sum, value) => sum + value, 0) / omissionSums.length : 0;
    const variance = omissionSums.length
        ? omissionSums.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / omissionSums.length
        : 0;
    return { omissionSum: { mean, stdev: Math.sqrt(variance) } };
}

function heuristicSearch(draws) {
    const hotConfigs = [
        { depth: 8, hot: 2.0, omitThreshold: 5, omitWeight: 0.25, recentDepth: 4, recentWeight: 1.0, nearWeight: 0.3 },
        { depth: 10, hot: 2.0, omitThreshold: 5, omitWeight: 0.20, recentDepth: 3, recentWeight: 1.0, nearWeight: 0.3 },
        { depth: 8, hot: 1.2, omitThreshold: 7, omitWeight: 0.15, recentDepth: 4, recentWeight: 0.6, nearWeight: 0.1 }
    ];
    const slotConfigs = [
        { depth: 20, slotWeight: 3.2, omitThreshold: 7, omitWeight: 0.25, nearRange: 4, nearWeight: 0.4, anchorWeight: 1.0 },
        { depth: 12, slotWeight: 2.6, omitThreshold: 7, omitWeight: 0.15, nearRange: 3, nearWeight: 0.0, anchorWeight: 4.0 },
        { depth: 16, slotWeight: 2.6, omitThreshold: 6, omitWeight: 0.15, nearRange: 4, nearWeight: 0.4, anchorWeight: 2.0 }
    ];
    const velocityConfigs = [
        { depth: 8, hot: 2.0, omitThreshold: 5, omitWeight: 0.15, velocityWeight: 1.0 },
        { depth: 16, hot: 1.6, omitThreshold: 9, omitWeight: 0.2, velocityWeight: 1.4 },
        { depth: 8, hot: 2.0, omitThreshold: 5, omitWeight: 0.15, velocityWeight: 0.8 }
    ];
    const weights = [
        [1.0, 1.2, 0.8],
        [1.2, 1.0, 1.2],
        [0.8, 1.2, 0.8],
        [1.2, 1.2, 0.8]
    ];
    const windowSizes = [24, 36];

    let best = null;
    let tested = 0;

    windowSizes.forEach((windowSize) => {
        hotConfigs.forEach((a) => {
            slotConfigs.forEach((b) => {
                velocityConfigs.forEach((c) => {
                    weights.forEach((weightSet) => {
                        const config = {
                            windowSize,
                            wa: weightSet[0],
                            wb: weightSet[1],
                            wc: weightSet[2],
                            a: { ...a },
                            b: { ...b },
                            c: { ...c }
                        };
                        const evaluation = evaluateConfig(draws, config);
                        tested += 1;
                        if (
                            !best ||
                            evaluation.metrics.rate2 > best.metrics.rate2 ||
                            (evaluation.metrics.rate2 === best.metrics.rate2 && evaluation.metrics.rate3 > best.metrics.rate3) ||
                            (evaluation.metrics.rate2 === best.metrics.rate2 && evaluation.metrics.rate3 === best.metrics.rate3 && evaluation.metrics.objective > best.metrics.objective)
                        ) {
                            best = { config, ...evaluation };
                        }
                    });
                });
            });
        });
    });

    log(`參數搜尋完成，共測試 ${tested} 組。`, "green-500");
    log(`最佳結果：2星 ${best.metrics.rate2.toFixed(1)}%，3星 ${best.metrics.rate3.toFixed(1)}%。`, "orange-400");
    return best;
}

function evaluateConfig(draws, config) {
    const results = [];
    let hit2 = 0;
    let hit3 = 0;
    let hit4 = 0;
    let hit5 = 0;
    const testCount = Math.max(0, draws.length - config.windowSize - 1);

    for (let i = 0; i < testCount; i += 1) {
        const actual = draws[i];
        const train = draws.slice(i + 1, i + 1 + config.windowSize);
        if (train.length < config.windowSize) break;

        const prediction = buildPrediction(train, config);
        const hitNums = prediction.filter((num) => actual.nums.includes(num));
        const hits = hitNums.length;

        if (hits >= 2) hit2 += 1;
        if (hits >= 3) hit3 += 1;
        if (hits >= 4) hit4 += 1;
        if (hits >= 5) hit5 += 1;

        results.push({
            label: actual.label,
            actual: actual.nums,
            prediction,
            hits,
            hitNums
        });
    }

    const divisor = results.length || 1;
    const metrics = {
        rate2: (hit2 / divisor) * 100,
        rate3: (hit3 / divisor) * 100,
        rate4: (hit4 / divisor) * 100,
        rate5: (hit5 / divisor) * 100,
        objective: ((hit2 / divisor) * 10) + ((hit3 / divisor) * 50) + ((hit4 / divisor) * 200),
        testCount: results.length
    };

    return { results, metrics };
}

function buildPrediction(train, config) {
    const voteMap = new Map();
    for (let n = 1; n <= 39; n += 1) {
        voteMap.set(n, 0);
    }

    const modelA = predictHotOmit(train, config.a);
    const modelB = predictSlotModel(train, config.b);
    const modelC = predictVelocityModel(train, config.c);

    modelA.forEach((num, index) => voteMap.set(num, voteMap.get(num) + config.wa * (6 - index)));
    modelB.forEach((num, index) => voteMap.set(num, voteMap.get(num) + config.wb * (6 - index)));
    modelC.forEach((num, index) => voteMap.set(num, voteMap.get(num) + config.wc * (6 - index)));

    train.slice(0, 10).forEach((draw, index) => {
        draw.nums.forEach((num) => {
            voteMap.set(num, voteMap.get(num) + ((10 - index) * 0.05));
        });
    });

    return [...voteMap.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .slice(0, 5)
        .map(([num]) => num)
        .sort((a, b) => a - b);
}

function predictHotOmit(train, cfg) {
    const scores = new Map();
    const omitMap = getOmissions(train);
    for (let n = 1; n <= 39; n += 1) scores.set(n, 0);

    train.slice(0, cfg.depth).forEach((draw, index) => {
        const weight = (cfg.depth - index) / cfg.depth;
        draw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.hot * weight));
        });
    });

    for (let n = 1; n <= 39; n += 1) {
        if (omitMap[n] > cfg.omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * cfg.omitWeight));
        }
    }

    train.slice(0, cfg.recentDepth).forEach((draw) => {
        draw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + cfg.recentWeight);
            if (num > 1) scores.set(num - 1, scores.get(num - 1) + cfg.nearWeight);
            if (num < 39) scores.set(num + 1, scores.get(num + 1) + cfg.nearWeight);
        });
    });

    return topNumbers(scores);
}

function predictSlotModel(train, cfg) {
    const scores = new Map();
    const omitMap = getOmissions(train);
    for (let n = 1; n <= 39; n += 1) scores.set(n, 0);

    for (let slot = 0; slot < 5; slot += 1) {
        train.slice(0, cfg.depth).forEach((draw, index) => {
            const weight = (cfg.depth - index) / cfg.depth;
            const value = draw.nums[slot];
            scores.set(value, scores.get(value) + (cfg.slotWeight * weight));
        });

        const anchor = train[0].nums[slot];
        for (let i = 1; i < train.length; i += 1) {
            if (train[i].nums[slot] === anchor && i > 0) {
                const nextValue = train[i - 1].nums[slot];
                scores.set(nextValue, scores.get(nextValue) + cfg.anchorWeight);
            }
        }
    }

    for (let n = 1; n <= 39; n += 1) {
        if (omitMap[n] > cfg.omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * cfg.omitWeight));
        }
    }

    const recent = train[0].nums;
    for (let n = 1; n <= 39; n += 1) {
        const minDistance = Math.min(...recent.map((value) => Math.abs(value - n)));
        if (minDistance <= cfg.nearRange) {
            scores.set(n, scores.get(n) + cfg.nearWeight);
        }
    }

    return topNumbers(scores);
}

function predictVelocityModel(train, cfg) {
    const scores = new Map();
    const omitMap = getOmissions(train);
    for (let n = 1; n <= 39; n += 1) scores.set(n, 0);

    train.slice(0, cfg.depth).forEach((draw, index) => {
        const weight = (cfg.depth - index) / cfg.depth;
        draw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.hot * weight));
        });
    });

    for (let n = 1; n <= 39; n += 1) {
        if (omitMap[n] > cfg.omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * cfg.omitWeight));
        }
        scores.set(n, scores.get(n) + (getOmissionVelocity(n, train) * cfg.velocityWeight));
    }

    return topNumbers(scores);
}

function getOmissions(history) {
    const omit = {};
    for (let n = 1; n <= 39; n += 1) omit[n] = 0;

    for (let n = 1; n <= 39; n += 1) {
        let gap = 0;
        for (const draw of history) {
            if (draw.nums.includes(n)) break;
            gap += 1;
        }
        omit[n] = gap;
    }
    return omit;
}

function getOmissionVelocity(num, history) {
    const gaps = [];
    let currentGap = 0;

    for (const draw of history) {
        if (draw.nums.includes(num)) {
            gaps.push(currentGap);
            currentGap = 0;
        } else {
            currentGap += 1;
        }
    }

    return analyzeGapPattern(gaps, currentGap);
}

function analyzeGapPattern(gaps, currentGap) {
    if (!gaps.length) return 0;
    const avgGap = gaps.reduce((sum, value) => sum + value, 0) / gaps.length;
    const delta = currentGap - avgGap;
    if (Math.abs(delta) <= 1) return 1.5;
    if (delta > 1) return 0.7;
    return 0.2;
}

function topNumbers(scoreMap) {
    return [...scoreMap.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .slice(0, 5)
        .map(([num]) => num);
}

function summarizeConfig(config) {
    return [
        `Window ${config.windowSize}`,
        `投票 ${config.wa.toFixed(1)}/${config.wb.toFixed(1)}/${config.wc.toFixed(1)}`,
        `Hot ${config.a.depth}`,
        `Slot ${config.b.depth}`,
        `Velocity ${config.c.depth}`
    ].join(" | ");
}
    </script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        let worker = null;

        function addLog(message, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            const span = document.createElement("span");
            span.className = `text-${color}`;
            span.innerHTML = `&gt; ${message}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function formatNumber(num) {
            return String(num).padStart(2, "0");
        }

        function setStatus(mode, dotClass) {
            document.getElementById("strategyMode").innerText = mode;
            document.getElementById("statusDot").className = dotClass;
        }

        function ensureWorker() {
            if (worker) return worker;

            const source = document.getElementById("worker-source").textContent;
            const blob = new Blob([source], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            worker = new Worker(url);

            worker.onmessage = (event) => {
                const { type, payload } = event.data || {};
                if (type === "log") {
                    addLog(payload.message, payload.color || "gray-500");
                    return;
                }
                if (type === "analysis") {
                    updateUI(payload);
                }
            };

            worker.onerror = (event) => {
                addLog(`Worker 執行錯誤：${event.message || "未知錯誤"}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            worker.onmessageerror = () => {
                addLog("Worker 訊息解析失敗。", "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            addLog("Worker 已建立。", "green-500");
            return worker;
        }

        async function fetchSheetData() {
            addLog("開始同步 Google Sheet 資料...", "orange-500");
            setStatus("SYNC", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                const rawData = typeof result === "string" ? result : (typeof result.data === "string" ? result.data : "");
                if (!rawData.trim()) {
                    throw new Error("API 沒有回傳可用資料。");
                }

                const lines = rawData.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
                const draws = lines
                    .map((line) => {
                        const tokens = line.split(/\s+/);
                        const nums = tokens.slice(-5).map(Number);
                        if (nums.length !== 5 || nums.some((num) => !Number.isInteger(num) || num < 1 || num > 39)) {
                            return null;
                        }
                        if (new Set(nums).size !== 5) {
                            return null;
                        }
                        return { nums };
                    })
                    .filter(Boolean)
                    .reverse()
                    .map((draw, index) => ({
                        label: `第 ${String(index + 1).padStart(3, "0")} 期`,
                        nums: draw.nums
                    }));

                if (draws.length < 36) {
                    throw new Error("有效資料不足 36 期。");
                }

                addLog(`同步完成，共載入 ${draws.length} 期。`, "green-500");
                ensureWorker().postMessage({ type: "analyze", payload: { draws } });
            } catch (error) {
                addLog(`同步失敗：${error.message}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            }
        }

        function updateUI(payload) {
            const { modelName, configSummary, filterSummary, nextPrediction, metrics, visibleResults } = payload;

            nextPrediction.forEach((num, index) => {
                document.getElementById(`p${index + 1}`).innerText = num ? formatNumber(num) : "--";
            });

            document.getElementById("hitRate").innerText =
                `2星/3星/4星/5星：${metrics.rate2.toFixed(1)} / ${metrics.rate3.toFixed(1)} / ${metrics.rate4.toFixed(1)} / ${metrics.rate5.toFixed(1)}`;

            if (metrics.rate2 < 100) {
                setStatus("警戒", "w-2 h-2 bg-red-500 rounded-full mr-1");
            } else if (metrics.rate2 === 100 && metrics.rate3 > 50) {
                setStatus("穩定", "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse");
            } else {
                setStatus("優化中", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");
            }

            document.getElementById("modelMeta").innerText =
                `${modelName} | ${configSummary} | ${filterSummary} | 回測樣本 ${metrics.testCount} 期`;

            const rows = visibleResults.length
                ? visibleResults.map((result) => {
                    const hitSet = new Set(result.hitNums);
                    const predictionHtml = result.prediction
                        .map((num) => hitSet.has(num) ? `<span class="hit-num">${formatNumber(num)}</span>` : formatNumber(num))
                        .join(" ");
                    const dotHtml = result.prediction
                        .map((num) => `<span class="slot-dot ${hitSet.has(num) ? "slot-hit" : "slot-miss"}">${hitSet.has(num) ? "●" : "○"}</span>`)
                        .join("");
                    return `
                        <tr class="border-b border-white/5">
                            <td class="py-3 text-gray-500 font-mono">${result.label}</td>
                            <td class="font-mono text-white">${result.actual.map(formatNumber).join(" ")}</td>
                            <td class="text-[11px] text-gray-400 font-mono">${predictionHtml}</td>
                            <td>${dotHtml}</td>
                            <td class="text-right font-black ${result.hits >= 3 ? "text-orange-500" : result.hits >= 2 ? "text-white" : "text-gray-500"}">${result.hits}</td>
                        </tr>
                    `;
                }).join("")
                : `<tr><td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">沒有可顯示的回測資料</td></tr>`;

            document.getElementById("historyTable").innerHTML = rows;
            addLog(`回測完成：2星 ${metrics.rate2.toFixed(1)}%，3星 ${metrics.rate3.toFixed(1)}%。`, "green-500");
            addLog(`下一期推薦：${nextPrediction.map(formatNumber).join(" ")}`, "orange-400");
        }

        ensureWorker();
    </script>
</body>
</html>
