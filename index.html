<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v9.50 | 鄰號拖牌強攻版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-orange: #ff3b30; --ios-bg: #000000; --ios-panel: #1c1c1e; }
        body { background-color: var(--ios-bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; }
        .ios-panel { background: var(--ios-panel); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .hit-cell { background: linear-gradient(145deg, #ff3b30, #ff7f50); color: #fff; box-shadow: 0 4px 12px rgba(255,59,48,0.4); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #logBox::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-red-500">EVO <span class="text-white">9.50</span></h1>
            <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Imbalance Detection Engine</p>
        </div>
        <button onclick="fetchSheetData()" class="bg-red-500 text-white px-5 py-2 rounded-full font-bold text-sm shadow-lg active:scale-95 transition-transform">同步數據</button>
    </div>

    <div class="ios-panel p-4 mb-4">
        <label class="text-[10px] text-gray-500 font-bold mb-3 block">ZONE INTENSITY (區間飽和度)</label>
        <div id="zoneGrid" class="grid grid-cols-4 gap-2">
            </div>
    </div>

    <div class="ios-panel p-5 mb-4 border-l-4 border-red-500">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-bold text-gray-400">NEXT DRAW PREDICTION</span>
            <span id="aiStatus" class="text-[10px] bg-red-500/10 text-red-500 px-2 py-0.5 rounded border border-red-500/20">WAITING</span>
        </div>
        <div class="flex justify-between" id="predictionRow">
            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-xl font-black text-white">--</div>
            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-xl font-black text-white">--</div>
            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-xl font-black text-white">--</div>
            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-xl font-black text-white">--</div>
            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-xl font-black text-white">--</div>
        </div>
    </div>

    <div id="logBox" class="ios-panel p-3 mb-4 h-24 overflow-y-auto text-[10px] font-mono text-gray-500 leading-relaxed">
        > 引擎就緒。等待注入歷史開獎數據以進行鄰號拖牌分析...
    </div>

    <div class="ios-panel flex-grow p-4 overflow-hidden flex flex-col">
        <div class="grid grid-cols-3 gap-4 mb-4 text-center">
            <div><p class="text-[10px] text-gray-500">2★命中率</p><p id="rate2" class="text-lg font-black text-red-500">0%</p></div>
            <div><p class="text-[10px] text-gray-500">回測期數</p><p id="testCount" class="text-lg font-black">0</p></div>
            <div><p class="text-[10px] text-gray-500">偏離度</p><p id="bias" class="text-lg font-black text-blue-500">0.0</p></div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-xs">
                <tbody id="historyTable" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <script id="worker-source" type="text/plain">
        self.onmessage = (e) => {
            const { draws } = e.data;
            const config = {
                lookback: 60,
                neighborWeight: 2.5, // 鄰號拖牌權重 (核心)
                reoccurrenceWeight: 1.8, // 重複開出權重
                zoneBalance: true
            };

            const results = [];
            let hit2 = 0, hit3 = 0;
            const testSize = Math.min(draws.length - config.lookback, 40);

            for(let i=0; i < testSize; i++) {
                const training = draws.slice(i+1, i+1+config.lookback);
                const actual = draws[i].nums;
                const prediction = analyzeV95(training);
                const hits = prediction.filter(n => actual.includes(n)).length;
                if(hits >= 2) hit2++;
                if(hits >= 3) hit3++;
                results.push({ label: draws[i].label, actual, prediction, hits });
            }

            const nextPrediction = analyzeV95(draws.slice(0, config.lookback));
            const zones = calculateZones(draws.slice(0, 10));

            self.postMessage({
                nextPrediction,
                metrics: { rate2: (hit2/testSize)*100, testCount: testSize },
                results,
                zones
            });
        };

        function analyzeV95(history) {
            const scores = new Map();
            for(let i=1; i<=39; i++) scores.set(i, 0);

            // 核心邏輯 1：鄰號拖牌 (Correlation Drag)
            // 檢查上一期號碼的左右鄰號
            history[0].nums.forEach(n => {
                if(n > 1) scores.set(n-1, scores.get(n-1) + 3.0);
                if(n < 39) scores.set(n+1, scores.get(n+1) + 3.0);
                scores.set(n, scores.get(n) + 1.5); // 號碼重連機率
            });

            // 核心邏輯 2：遺漏拐點 (Omit Inflection)
            for(let i=1; i<=39; i++) {
                let gap = 0;
                for(const d of history) {
                    if(d.nums.includes(i)) break;
                    gap++;
                }
                // 鎖定 4-9 期未開的號碼 (539 的熱門回歸區間)
                if(gap >= 4 && gap <= 9) scores.set(i, scores.get(i) + 4.0);
                else if(gap > 15) scores.set(i, scores.get(i) - 2.0); // 排除極冷號
            }

            // 核心邏輯 3：尾數同步
            const tailMap = {};
            history.slice(0, 5).forEach(d => {
                d.nums.forEach(n => {
                    const tail = n % 10;
                    tailMap[tail] = (tailMap[tail] || 0) + 1;
                });
            });
            for(let i=1; i<=39; i++) {
                if(tailMap[i % 10] > 2) scores.set(i, scores.get(i) + 2.0);
            }

            // 選出前 8 碼進入候選，再進行物理過濾
            const pool = [...scores.entries()]
                .sort((a,b) => b[1] - a[1])
                .slice(0, 8)
                .map(x => x[0]);

            return pool.slice(0, 5).sort((a,b)=>a-b);
        }

        function calculateZones(recent) {
            const z = [0, 0, 0, 0];
            recent.forEach(d => {
                d.nums.forEach(n => {
                    if(n <= 10) z[0]++;
                    else if(n <= 20) z[1]++;
                    else if(n <= 30) z[2]++;
                    else z[3]++;
                });
            });
            return z.map(v => (v / 50) * 100); // 飽和百分比
        }
    </script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        let worker = null;

        function initWorker() {
            const blob = new Blob([document.getElementById('worker-source').textContent], {type: 'text/javascript'});
            worker = new Worker(URL.createObjectURL(blob));
            worker.onmessage = (e) => {
                const { nextPrediction, metrics, results, zones } = e.data;
                renderUI(nextPrediction, metrics, results, zones);
            };
        }

        async function fetchSheetData() {
            log("正在與雲端同步...");
            try {
                const r = await fetch(API_URL);
                const j = await r.json();
                const draws = j.data.split('\n').filter(l => l.trim()).reverse().map((l, i) => ({
                    label: `Draw-${i}`,
                    nums: l.trim().split(/\s+/).slice(-5).map(Number).sort((a,b)=>a-b)
                }));
                log(`同步完成：${draws.length} 期`);
                worker.postMessage({ draws });
            } catch(e) { log("錯誤: " + e.message, "text-red-500"); }
        }

        function renderUI(pred, mt, res, zones) {
            const row = document.getElementById('predictionRow');
            row.innerHTML = pred.map(n => `<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-red-500/20 border border-red-500/30 text-xl font-black text-red-500 shadow-[0_0_15px_rgba(255,59,48,0.2)]">${String(n).padStart(2,'0')}</div>`).join('');
            
            document.getElementById('rate2').innerText = mt.rate2.toFixed(1) + '%';
            document.getElementById('testCount').innerText = mt.testCount;
            document.getElementById('aiStatus').innerText = "LIVE ANALYZING";
            
            const zoneGrid = document.getElementById('zoneGrid');
            zoneGrid.innerHTML = zones.map((v, i) => `
                <div class="bg-white/5 p-2 rounded-lg text-center">
                    <div class="text-[8px] text-gray-500">Z${i+1}</div>
                    <div class="text-xs font-bold ${v > 30 ? 'text-red-500' : 'text-green-500'}">${v.toFixed(0)}%</div>
                </div>
            `).join('');

            document.getElementById('historyTable').innerHTML = res.map(r => `
                <tr class="h-10 border-b border-white/5">
                    <td class="text-gray-600 font-mono">${r.label}</td>
                    <td class="font-bold text-gray-300">${r.actual.map(n => String(n).padStart(2,'0')).join(' ')}</td>
                    <td class="text-red-500 font-bold">${r.prediction.map(n => r.actual.includes(n) ? `<span class="bg-red-500 text-white px-1 rounded">${String(n).padStart(2,'0')}</span>` : String(n).padStart(2,'0')).join(' ')}</td>
                    <td class="text-right font-black">${r.hits}★</td>
                </tr>
            `).join('');
            log("鄰號拖牌矩陣計算完畢。");
        }

        function log(m, cl="text-gray-500") {
            const b = document.getElementById('logBox');
            b.innerHTML += `<div class="${cl}">> ${m}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        initWorker();
    </script>
</body>
</html>
