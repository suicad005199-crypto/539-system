<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v9.40 高勝率改良版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-orange: #f97316; --ios-bg: #000000; --ios-panel: #1c1c1e; }
        body { background-color: var(--ios-bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .ios-panel { background: var(--ios-panel); border-radius: 12px; }
        .orange-glow { box-shadow: 0 0 35px rgba(249, 115, 22, 0.3); }
        .btn-active { background: var(--ios-orange); color: #000; font-weight: 700; }
        #logBox { font-variant-numeric: tabular-nums; scrollbar-width: none; }
        #logBox::-webkit-scrollbar { display: none; }
        .hit-num { color: #fff; font-weight: 900; background: var(--ios-orange); padding: 1px 4px; border-radius: 4px; }
        .grid-val { text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
        .score-bar { height: 4px; border-radius: 2px; background: #333; overflow: hidden; margin-top: 2px; }
        .score-fill { height: 100%; background: var(--ios-orange); transition: width 0.5s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">
            ULTIMATE <span class="text-white">EVO 9.40</span>
        </h1>
        <button id="btnSync" onclick="fetchSheetData()" class="px-4 py-1.5 rounded-lg text-sm btn-active">開始同步</button>
    </div>

    <div class="ios-panel p-4 mb-4 border border-orange-500/30">
        <div class="flex justify-between items-end mb-2">
            <label class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">引擎監控與日誌</label>
            <div id="statusDot" class="text-[10px] text-green-500 font-bold">● ONLINE</div>
        </div>
        <div id="logBox" class="bg-black/50 p-3 rounded-lg text-[10px] h-20 overflow-y-auto font-mono border border-white/5 leading-relaxed text-gray-400">
            > 等待資料輸入以啟動排除演算法...
        </div>
    </div>

    <div class="ios-panel p-4 mb-4">
        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-2">核心候選池評分 (Top 12)</label>
        <div id="scoreContainer" class="grid grid-cols-6 gap-2">
            </div>
    </div>

    <div class="ios-panel p-4 mb-4 border-t-4 border-orange-600">
        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-3">最終精選 5 碼 (常態分佈過濾器)</label>
        <div class="grid grid-cols-5 gap-2" id="predictionGrid">
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[16px] font-black text-white" id="p1">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[16px] font-black text-white" id="p2">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[16px] font-black text-white" id="p3">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[16px] font-black text-white" id="p4">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[16px] font-black text-white" id="p5">--</div>
            </div>
        </div>
        <div id="modelMeta" class="mt-3 text-[10px] text-gray-500">模型權重：動態權衡遺漏速度與冷熱回歸</div>
    </div>

    <div class="ios-panel p-4 flex-grow overflow-hidden flex flex-col">
        <div id="hitRateGrid" class="grid grid-cols-4 gap-2 mb-3">
            <div class="bg-white/5 rounded-lg p-2 text-center border border-white/10">
                <div class="text-[9px] text-gray-500 font-bold">2星率</div>
                <div id="rate2" class="text-base font-black text-orange-500">0%</div>
            </div>
            <div class="bg-white/5 rounded-lg p-2 text-center border border-white/10">
                <div class="text-[9px] text-gray-500 font-bold">3星率</div>
                <div id="rate3" class="text-base font-black text-white">0%</div>
            </div>
            <div class="bg-white/5 rounded-lg p-2 text-center border border-white/10">
                <div class="text-[9px] text-gray-500 font-bold">回測期數</div>
                <div id="testCount" class="text-base font-black text-white">0</div>
            </div>
            <div class="bg-white/5 rounded-lg p-2 text-center border border-white/10">
                <div class="text-[9px] text-gray-500 font-bold">綜合得分</div>
                <div id="objScore" class="text-base font-black text-white">0</div>
            </div>
        </div>
        
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-[11px]">
                <tbody id="historyTable" class="divide-y divide-white/5 font-mono text-gray-400">
                    </tbody>
            </table>
        </div>
    </div>

    <script id="worker-source" type="text/plain">
        self.onmessage = (e) => {
            const { draws } = e.data.payload;
            
            // 演算法配置：加權優化
            const config = {
                omitWeight: 1.8,    // 遺漏回歸權重
                hotWeight: 1.2,     // 熱號追蹤權重
                velocityWeight: 1.5, // 速度感應
                window: 48,          // 分析窗口
                poolSize: 12         // 核心候選池大小
            };

            const results = [];
            let hitsCount = { 2:0, 3:0, 4:0, 5:0 };
            const testRange = Math.min(draws.length - config.window - 1, 30);

            for(let i=0; i < testRange; i++) {
                const training = draws.slice(i+1, i+1+config.window);
                const actual = draws[i].nums;
                const prediction = generateHighProb5(training, config);
                const hits = prediction.filter(n => actual.includes(n)).length;
                
                if(hits >= 2) hitsCount[2]++;
                if(hits >= 3) hitsCount[3]++;
                if(hits >= 4) hitsCount[4]++;
                if(hits >= 5) hitsCount[5]++;
                
                results.push({ label: draws[i].label, actual, prediction, hits });
            }

            // 生成下一期預測
            const nextScores = calculateScores(draws.slice(0, config.window), config);
            const nextPool = getTopN(nextScores, config.poolSize);
            const nextPrediction = getBestCombo(nextPool);

            self.postMessage({
                type: "analysis",
                payload: {
                    results,
                    metrics: {
                        rate2: (hitsCount[2] / testRange) * 100,
                        rate3: (hitsCount[3] / testRange) * 100,
                        testCount: testRange,
                        obj: (hitsCount[2]*10 + hitsCount[3]*50)
                    },
                    nextPrediction,
                    topScores: nextPool.map(n => ({num: n, score: nextScores.get(n)}))
                }
            });
        };

        function calculateScores(history, cfg) {
            const scores = new Map();
            for(let i=1; i<=39; i++) scores.set(i, 0);

            // 1. 遺漏分析 (Omission Velocity)
            const omits = getOmissions(history);
            for(let i=1; i<=39; i++) {
                const o = omits[i];
                // 排除極端冷號 (遺漏 > 25期) 除非它剛有回溫跡象
                if(o > 25) scores.set(i, -10);
                else scores.set(i, scores.get(i) + (o * cfg.omitWeight));
            }

            // 2. 冷熱度 (Frequency)
            history.slice(0, 12).forEach((draw, idx) => {
                const weight = (12 - idx) / 12 * cfg.hotWeight;
                draw.nums.forEach(n => scores.set(n, scores.get(n) + weight * 5));
            });

            return scores;
        }

        function getOmissions(history) {
            const res = {};
            for(let i=1; i<=39; i++) {
                let gap = 0;
                for(let d of history) {
                    if(d.nums.includes(i)) break;
                    gap++;
                }
                res[i] = gap;
            }
            return res;
        }

        function getTopN(scoreMap, n) {
            return [...scoreMap.entries()]
                .sort((a,b) => b[1] - a[1])
                .slice(0, n)
                .map(i => i[0]);
        }

        function getBestCombo(pool) {
            // 從 Top 池中選出最符合常態規律的 5 碼
            // 1. 優先取前 5
            let combo = pool.slice(0, 5).sort((a,b)=>a-b);
            // 2. 進行簡單物理檢查，若太極端則微調
            const sum = combo.reduce((a,b)=>a+b, 0);
            if(sum < 65 || sum > 135) {
                // 若總和過低，把最小號換成池中較大的號碼
                combo[0] = pool[5]; 
            }
            return combo.sort((a,b)=>a-b);
        }

        function generateHighProb5(history, cfg) {
            const scores = calculateScores(history, cfg);
            const pool = getTopN(scores, cfg.poolSize);
            return getBestCombo(pool);
        }
    </script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        let worker = null;

        function initWorker() {
            const blob = new Blob([document.getElementById('worker-source').textContent], {type: 'text/javascript'});
            worker = new Worker(URL.createObjectURL(blob));
            worker.onmessage = (e) => {
                const { results, metrics, nextPrediction, topScores } = e.data.payload;
                updateUI(nextPrediction, metrics, results, topScores);
            };
        }

        async function fetchSheetData() {
            addLog("連線中...");
            try {
                const resp = await fetch(API_URL);
                const json = await resp.json();
                const lines = json.data.split('\n').filter(l => l.trim()).reverse();
                const draws = lines.map((l, i) => ({
                    label: `T-${i}`,
                    nums: l.trim().split(/\s+/).slice(-5).map(Number).sort((a,b)=>a-b)
                }));
                addLog("同步成功，分析中...");
                worker.postMessage({ payload: { draws } });
            } catch(e) { addLog("同步失敗: " + e.message, "text-red-500"); }
        }

        function updateUI(prediction, metrics, results, topScores) {
            // Update 5-Num Grid
            prediction.forEach((n, i) => {
                document.getElementById(`p${i+1}`).innerText = String(n).padStart(2, '0');
            });

            // Update Metrics
            document.getElementById('rate2').innerText = metrics.rate2.toFixed(1) + '%';
            document.getElementById('rate3').innerText = metrics.rate3.toFixed(1) + '%';
            document.getElementById('testCount').innerText = metrics.testCount;
            document.getElementById('objScore').innerText = metrics.obj;

            // Update Top Scorers
            const scoreContainer = document.getElementById('scoreContainer');
            scoreContainer.innerHTML = topScores.map(s => `
                <div class="text-center">
                    <div class="text-[12px] font-bold text-orange-400">${String(s.num).padStart(2, '0')}</div>
                    <div class="score-bar"><div class="score-fill" style="width: ${Math.min(s.score * 5, 100)}%"></div></div>
                </div>
            `).join('');

            // Update Table
            document.getElementById('historyTable').innerHTML = results.map(r => `
                <tr class="h-10">
                    <td>${r.label}</td>
                    <td class="text-white">${r.actual.map(n => String(n).padStart(2,'0')).join(' ')}</td>
                    <td class="text-orange-500">${r.prediction.map(n => r.actual.includes(n) ? `<b>${n}</b>` : n).join(' ')}</td>
                    <td class="text-right">${r.hits}★</td>
                </tr>
            `).join('');
            
            addLog("分析完畢。建議關注核心候選池。");
        }

        function addLog(msg, cls="text-gray-400") {
            const b = document.getElementById('logBox');
            b.innerHTML += `<div class="${cls}">> ${msg}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        initWorker();
    </script>
</body>
</html>
