<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v8.85 FIVE-PICK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-orange: #f97316;
            --ios-bg: #000000;
            --ios-panel: #1c1c1e;
        }

        body {
            background-color: var(--ios-bg);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        .ios-panel {
            background: var(--ios-panel);
            border-radius: 12px;
        }

        .orange-glow {
            box-shadow: 0 0 35px rgba(249, 115, 22, 0.3);
        }

        .btn-active {
            background: var(--ios-orange);
            color: #000;
            font-weight: 700;
        }

        #logBox {
            font-variant-numeric: tabular-nums;
            scrollbar-width: none;
        }

        #logBox::-webkit-scrollbar {
            display: none;
        }

        .hit-num {
            color: #fff;
            font-weight: 900;
            background: var(--ios-orange);
            padding: 1px 4px;
            border-radius: 4px;
        }

        .grid-val {
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">
            ULTIMATE <span class="text-white">EVO 8.85</span>
        </h1>
        <div class="flex bg-[#2c2c2e] p-1 rounded-xl flex-nowrap shrink-0">
            <button id="btnSync" onclick="fetchSheetData()" class="px-4 py-1.5 rounded-lg text-sm btn-active whitespace-nowrap">
                同步資料
            </button>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 orange-glow border border-orange-500/50">
        <div class="flex justify-between items-end mb-2">
            <label class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">
                Panel 1: Engine Status
            </label>
            <div class="flex items-center text-[10px] text-orange-500 font-bold uppercase">
                <span id="statusDot" class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span>
                v8.85 <span id="strategyMode" class="ml-1 text-white">READY</span>
            </div>
        </div>
        <div id="logBox" class="bg-black/50 p-3 rounded-lg text-[11px] h-24 overflow-y-auto font-mono border border-white/5 leading-relaxed">
            <span class="text-gray-500">&gt; 等待同步 Google Sheet 資料...</span><br>
            <span class="text-gray-500">&gt; 模式已切換為固定選 5 碼</span>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 border-t-2 border-orange-600">
        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-3">
            Panel 2: Prediction Grid (固定選 5 碼)
        </label>
        <div class="grid grid-cols-5 gap-2" id="predictionGrid">
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">第 1 碼</div>
                <div class="text-lg font-black text-white grid-val" id="p1">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">第 2 碼</div>
                <div class="text-lg font-black text-white grid-val" id="p2">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">第 3 碼</div>
                <div class="text-lg font-black text-white" id="p3">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">第 4 碼</div>
                <div class="text-lg font-black text-white" id="p4">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">第 5 碼</div>
                <div class="text-lg font-black text-white" id="p5">--</div>
            </div>
        </div>
    </div>

    <div class="ios-panel p-4 flex-grow overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                Panel 3: Backtest
            </label>
            <div id="hitRate" class="text-[10px] font-black text-orange-500">HIT RATE (3+): 0.0%</div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-[12px]">
                <thead class="sticky top-0 bg-[#1c1c1e] text-gray-500 z-10">
                    <tr class="text-left border-b border-white/10">
                <th class="pb-2">期別</th>
                        <th class="pb-2">實際開獎</th>
                        <th class="pb-2">預測號碼 (5碼)</th>
                        <th class="pb-2 text-right">命中</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="divide-y divide-white/5">
                    <tr>
                        <td colspan="4" class="text-center py-10 text-gray-600 font-mono italic">NO DATA SYNCED</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";

        function addLog(msg, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            const span = document.createElement("span");
            span.className = `text-${color}`;
            span.innerHTML = `&gt; ${msg}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function fetchSheetData() {
            addLog("開始同步 Google Sheet...", "orange-500");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                const rawData =
                    typeof result === "string"
                        ? result
                        : typeof result.data === "string"
                            ? result.data
                            : "";

                if (!rawData.trim()) {
                    throw new Error("API 沒有回傳可用資料");
                }

                addLog("同步成功，開始分析固定 5 碼模型", "green-500");
                processData(rawData);
            } catch (error) {
                addLog(`同步失敗: ${error.message}`, "red-500");
                document.getElementById("strategyMode").innerText = "ERROR";
                document.getElementById("statusDot").className = "w-2 h-2 bg-red-500 rounded-full mr-1";
            }
        }

        function processData(raw) {
            const lines = raw
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter((line) => line && !/^date\b/i.test(line));

            const history = lines
                .map((line, index) => {
                    const tokens = line.split(/\s+/);
                    let label = "";
                    let nums = [];

                    if (tokens.length >= 6 && /^\d{4}-\d{2}-\d{2}$/.test(tokens[0])) {
                        label = tokens[0];
                        nums = tokens.slice(-5).map(Number).sort((a, b) => a - b);
                    } else if (tokens.length === 5) {
                        label = `第 ${String(index + 1).padStart(3, "0")} 期`;
                        nums = tokens.map(Number).sort((a, b) => a - b);
                    } else {
                        return null;
                    }

                    if (nums.length !== 5 || nums.some((num) => !Number.isInteger(num) || num < 1 || num > 39)) {
                        return null;
                    }

                    if (new Set(nums).size !== 5) {
                        return null;
                    }

                    return { label, nums };
                })
                .filter(Boolean);

            if (history.length && /^\d{4}-\d{2}-\d{2}$/.test(history[0].label)) {
                history.sort((a, b) => new Date(b.label) - new Date(a.label));
            } else {
                history.reverse();
            }

            if (history.length < 11) {
                addLog("資料不足，至少需要 11 期才能回測", "red-500");
                return;
            }

            runBacktest(history);
        }

        function getUnifiedLogic(historyWindow) {
            const scores = Array(40).fill(0);
            const gapScores = Array(40).fill(0);
            const tailMap = Array(10).fill(0);

            historyWindow.slice(0, 10).forEach((draw, idx) => {
                draw.nums.forEach((num) => {
                    scores[num] += (10 - idx) * 2;
                    if (num > 1) {
                        scores[num - 1] += 2;
                    }
                    if (num < 39) {
                        scores[num + 1] += 2;
                    }
                });
            });

            for (let num = 1; num <= 39; num += 1) {
                let gap = 0;
                for (const draw of historyWindow) {
                    if (draw.nums.includes(num)) {
                        break;
                    }
                    gap += 1;
                }
                if (gap > 5 && gap < 15) {
                    gapScores[num] += gap * 3;
                }
            }

            historyWindow.slice(0, 5).forEach((draw) => {
                draw.nums.forEach((num) => {
                    tailMap[num % 10] += 1;
                });
            });

            const ranked = [];
            for (let num = 1; num <= 39; num += 1) {
                const total = scores[num] + gapScores[num] + tailMap[num % 10] * 5;
                ranked.push({ num, score: total });
            }

            return ranked
                .sort((a, b) => {
                    if (b.score !== a.score) {
                        return b.score - a.score;
                    }
                    return a.num - b.num;
                })
                .slice(0, 5)
                .map((item) => item.num)
                .sort((a, b) => a - b);
        }

        function runBacktest(history) {
            let stars3Plus = 0;
            let rowsHtml = "";
            const testRange = Math.min(history.length - 10, 15);

            for (let i = 0; i < testRange; i += 1) {
                const trainData = history.slice(i + 1);
                const actual = history[i].nums;
                const prediction = getUnifiedLogic(trainData);
                const hits = actual.filter((num) => prediction.includes(num));
                const hitCount = hits.length;

                if (hitCount >= 3) {
                    stars3Plus += 1;
                }

                const predHtml = prediction
                    .map((num) => {
                        const text = num.toString().padStart(2, "0");
                        return actual.includes(num) ? `<span class="hit-num">${text}</span>` : text;
                    })
                    .join(",");

                rowsHtml += `
                    <tr class="border-b border-white/5">
                        <td class="py-3 text-gray-500 font-mono">${history[i].label}</td>
                        <td class="font-mono text-white">${actual.map((num) => num.toString().padStart(2, "0")).join(" ")}</td>
                        <td class="text-[11px] text-gray-400 font-mono">${predHtml}</td>
                        <td class="text-right font-black ${hitCount >= 3 ? "text-orange-500" : hitCount >= 2 ? "text-white" : "text-gray-700"}">${hitCount}</td>
                    </tr>
                `;
            }

            const nextPred = getUnifiedLogic(history);
            for (let index = 0; index < 5; index += 1) {
                document.getElementById(`p${index + 1}`).innerText = nextPred[index].toString().padStart(2, "0");
            }

            document.getElementById("historyTable").innerHTML = rowsHtml || `
                <tr>
                    <td colspan="4" class="text-center py-10 text-gray-600 font-mono italic">NOT ENOUGH DATA</td>
                </tr>
            `;

            const rate = testRange > 0 ? ((stars3Plus / testRange) * 100).toFixed(1) : "0.0";
            document.getElementById("hitRate").innerText = `HIT RATE (3+): ${rate}%`;
            document.getElementById("strategyMode").innerText = Number(rate) > 20 ? "AGGRESSIVE" : "SEARCHING";
            document.getElementById("statusDot").className = "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse";

            addLog(`固定 5 碼回測完成，3 星命中率 ${rate}%`, "green-500");
            addLog(`下一期推薦: ${nextPred.map((num) => num.toString().padStart(2, "0")).join(" ")}`, "orange-400");
        }
    </script>
</body>
</html>
