    <script id="worker-source" type="text/plain">
const DISPLAY_ROWS = 10;
const BALL_COUNT = 39;
const MIN_DRAW_COUNT = 30;

self.onmessage = async (event) => {
    const { type, payload } = event.data || {};
    if (type !== "analyze") return;

    try {
        const draws = Array.isArray(payload?.draws) ? payload.draws : [];
        if (draws.length < MIN_DRAW_COUNT) {
            throw new Error(`資料不足，至少需要 ${MIN_DRAW_COUNT} 期才能分析。`);
        }

        log("Worker 已啟動，開始進行 Train / Validation / Test 切割。", "orange-500");
        const chronological = draws.slice().reverse();
        const split = splitDraws(chronological);
        const trainStats = buildHistoricalStats(split.train);
        const best = await heuristicSearch(split, trainStats);

        const validationMetrics = evaluateChronologicalSegment(
            split.validation,
            split.train,
            best.config,
            trainStats
        ).metrics;

        const testHistoryBefore = split.train.concat(split.validation);
        const testEvaluation = evaluateChronologicalSegment(
            split.test,
            testHistoryBefore,
            best.config,
            trainStats
        );

        const nextHistory = chronological.slice(-best.config.windowSize).reverse();
        const nextPrediction = buildPrediction(nextHistory, best.config, trainStats, true);
        const honestyGap = Math.max(
            Math.abs(best.trainingMetrics.rate2 - testEvaluation.metrics.rate2),
            Math.abs(best.trainingMetrics.rate3 - testEvaluation.metrics.rate3)
        );

        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.51 誠實回測版",
                config: best.config,
                configSummary: summarizeConfig(best.config),
                filterSummary: "Train 60% / Validation 20% / Test 20% 嚴格切割",
                nextPrediction,
                metrics: testEvaluation.metrics,
                visibleResults: testEvaluation.results.slice(-DISPLAY_ROWS).reverse(),
                honesty: {
                    training: best.trainingMetrics,
                    validation: validationMetrics,
                    test: testEvaluation.metrics,
                    gap: honestyGap,
                    warning: honestyGap > 15
                }
            }
        });
    } catch (error) {
        log(`Worker 執行失敗：${error.message}`, "red-500");
        self.postMessage({
            type: "analysis",
            payload: {
                modelName: "v9.51 誠實回測版",
                config: defaultConfig(),
                configSummary: "已退回預設參數",
                filterSummary: "Worker 錯誤",
                nextPrediction: [0, 0, 0, 0, 0],
                metrics: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                visibleResults: [],
                honesty: {
                    training: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                    validation: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                    test: { rate2: 0, rate3: 0, rate4: 0, rate5: 0, objective: 0, testCount: 0 },
                    gap: 0,
                    warning: false
                }
            }
        });
    }
};

function log(message, color) {
    self.postMessage({ type: "log", payload: { message, color } });
}

function defaultConfig() {
    return {
        windowSize: 48,
        candidatePool: 10,
        scoreWeights: { recency: 1.1, cooccurrence: 1.0, pattern: 0.9, omission: 0.7, tail: 0.5, zone: 0.45, consistency: 0.5 },
        recency: { depth: 14, hotWeight: 1.7, omitThreshold: 5, omitWeight: 0.12, nearWeight: 0.14, zoneWeight: 0.12 },
        cooccurrence: { depth: 32, recentDepth: 3, overlapWeight: 0.5, tailWeight: 0.2, neighborWeight: 0.15 },
        pattern: { segment: 3, minSimilarity: 0.56, reward: 1.8, maxMatches: 6, offsetWeight: 0.35 },
        tailCycle: { depth: 30, hotWeight: 0.35, missWeight: 0.45 },
        zoneBalance: { depth: 20, reward: 0.55 },
        combo: { sumWeight: 0.12, oddWeight: 0.45, overlapWeight: 0.65, spreadWeight: 0.4, tailPenaltyWeight: 0.6, zonePenaltyWeight: 1.5 }
    };
}

function splitDraws(chronological) {
    const total = chronological.length;
    const minWindow = 30;
    const trainEnd = Math.max(minWindow + 10, Math.floor(total * 0.6));
    const validationEnd = Math.max(trainEnd + 5, Math.floor(total * 0.8));

    const train = chronological.slice(0, trainEnd);
    const validation = chronological.slice(trainEnd, validationEnd);
    const test = chronological.slice(validationEnd);

    if (!train.length || !validation.length || test.length < 3) {
        throw new Error("資料不足，測試集少於 3 期");
    }

    return { train, validation, test };
}

function buildHistoricalStats(draws) {
    const sums = [];
    const oddCounts = [];
    const spreads = [];

    draws.forEach((draw) => {
        const sorted = draw.nums.slice().sort((a, b) => a - b);
        sums.push(sorted.reduce((sum, num) => sum + num, 0));
        oddCounts.push(sorted.filter((num) => num % 2 !== 0).length);
        spreads.push(sorted[sorted.length - 1] - sorted[0]);
    });

    return {
        sum: calcStats(sums),
        odd: calcStats(oddCounts),
        spread: calcStats(spreads)
    };
}

async function heuristicSearch(split, stats) {
    const isSmall = split.train.length < 120;
    const windowCandidates = isSmall ? [30, 36, 48] : [30, 36, 42, 48, 60];
    const eligibleWindows = windowCandidates.filter((windowSize) => (split.train.length - windowSize) >= 5);
    const allScoreSets = [
        { recency: 1.2, cooccurrence: 1.0, pattern: 0.9, omission: 0.7, tail: 0.45, zone: 0.40, consistency: 0.45 },
        { recency: 1.0, cooccurrence: 1.2, pattern: 1.0, omission: 0.6, tail: 0.55, zone: 0.45, consistency: 0.50 },
        { recency: 1.1, cooccurrence: 0.9, pattern: 1.2, omission: 0.8, tail: 0.35, zone: 0.55, consistency: 0.60 },
        { recency: 0.95, cooccurrence: 1.3, pattern: 1.35, omission: 0.65, tail: 0.30, zone: 0.25, consistency: 0.70 }
    ];
    const allRecencySets = [
        { depth: 12, hotWeight: 1.7, omitThreshold: 5, omitWeight: 0.12, nearWeight: 0.14, zoneWeight: 0.12 },
        { depth: 14, hotWeight: 1.7, omitThreshold: 5, omitWeight: 0.12, nearWeight: 0.14, zoneWeight: 0.12 },
        { depth: 18, hotWeight: 1.9, omitThreshold: 6, omitWeight: 0.14, nearWeight: 0.18, zoneWeight: 0.16 },
        { depth: 24, hotWeight: 1.5, omitThreshold: 7, omitWeight: 0.18, nearWeight: 0.10, zoneWeight: 0.10 }
    ];
    const cooccurrenceSets = [
        { depth: 24, recentDepth: 2, overlapWeight: 0.45, tailWeight: 0.20, neighborWeight: 0.10 },
        { depth: 32, recentDepth: 3, overlapWeight: 0.50, tailWeight: 0.20, neighborWeight: 0.15 },
        { depth: 40, recentDepth: 4, overlapWeight: 0.55, tailWeight: 0.15, neighborWeight: 0.18 }
    ];
    const allPatternSets = [
        { segment: 2, minSimilarity: 0.60, reward: 1.6, maxMatches: 4, offsetWeight: 0.25 },
        { segment: 3, minSimilarity: 0.56, reward: 1.8, maxMatches: 6, offsetWeight: 0.35 },
        { segment: 4, minSimilarity: 0.52, reward: 1.4, maxMatches: 5, offsetWeight: 0.25 }
    ];
    const allTailCycleSets = [
        { depth: 24, hotWeight: 0.30, missWeight: 0.40 },
        { depth: 30, hotWeight: 0.35, missWeight: 0.45 },
        { depth: 36, hotWeight: 0.25, missWeight: 0.55 }
    ];
    const allZoneBalanceSets = [
        { depth: 16, reward: 0.45 },
        { depth: 20, reward: 0.55 },
        { depth: 24, reward: 0.65 }
    ];
    const allPoolSizes = [8, 10, 12];
    const allComboSets = [
        { sumWeight: 0.12, oddWeight: 0.45, overlapWeight: 0.65, spreadWeight: 0.4, tailPenaltyWeight: 0.6, zonePenaltyWeight: 1.5 },
        { sumWeight: 0.12, oddWeight: 0.45, overlapWeight: 0.85, spreadWeight: 0.4, tailPenaltyWeight: 0.6, zonePenaltyWeight: 1.5 }
    ];
    const scoreSets = isSmall ? [allScoreSets[0], allScoreSets[1], allScoreSets[3]] : allScoreSets;
    const recencySets = isSmall ? [allRecencySets[1], allRecencySets[2]] : allRecencySets;
    const patternSets = isSmall ? [allPatternSets[0], allPatternSets[1]] : allPatternSets;
    const tailCycleSets = isSmall ? [allTailCycleSets[1]] : allTailCycleSets;
    const zoneBalanceSets = isSmall ? [allZoneBalanceSets[1]] : allZoneBalanceSets;
    const poolSizes = isSmall ? [7, 8, 9] : allPoolSizes;
    const comboSets = isSmall ? [allComboSets[0]] : allComboSets;

    let best = null;
    let aggressiveBest = null;
    let tested = 0;
    const totalTests =
        eligibleWindows.length *
        scoreSets.length *
        recencySets.length *
        cooccurrenceSets.length *
        patternSets.length *
        tailCycleSets.length *
        zoneBalanceSets.length *
        poolSizes.length *
        comboSets.length;

    outerLoop:
    for (const windowSize of eligibleWindows) {
        for (const scoreWeights of scoreSets) {
            for (const recency of recencySets) {
                for (const cooccurrence of cooccurrenceSets) {
                    for (const pattern of patternSets) {
                        for (const tailCycle of tailCycleSets) {
                            for (const zoneBalance of zoneBalanceSets) {
                                for (const candidatePool of poolSizes) {
                                    for (const combo of comboSets) {
                                        const config = {
                                            windowSize,
                                            candidatePool,
                                            scoreWeights: { ...scoreWeights },
                                            recency: { ...recency },
                                            cooccurrence: { ...cooccurrence },
                                            pattern: { ...pattern },
                                            tailCycle: { ...tailCycle },
                                            zoneBalance: { ...zoneBalance },
                                            combo: { ...combo }
                                        };
                                        const trainingEvaluation = evaluateChronologicalSegment(split.train, [], config, stats);
                                        if (trainingEvaluation.metrics.testCount < 5) continue;

                                        const validationEvaluation = evaluateChronologicalSegment(
                                            split.validation,
                                            split.train,
                                            config,
                                            stats
                                        );
                                        const overfitGap = Math.max(
                                            Math.abs(trainingEvaluation.metrics.rate2 - validationEvaluation.metrics.rate2),
                                            Math.abs(trainingEvaluation.metrics.rate3 - validationEvaluation.metrics.rate3)
                                        );
                                        const validationScore =
                                            (validationEvaluation.metrics.rate3 * 5.0) +
                                            (validationEvaluation.metrics.rate2 * 0.8) -
                                            (overfitGap * 0.35);
                                        const aggressiveScore =
                                            (validationEvaluation.metrics.rate3 * 8.0) +
                                            (validationEvaluation.metrics.rate2 * 0.05) +
                                            (windowSize * 0.12) +
                                            (cooccurrence.depth * 0.12) +
                                            (pattern.segment * 1.25) +
                                            (scoreWeights.pattern * 4.0) +
                                            (scoreWeights.cooccurrence * 3.0) +
                                            (scoreWeights.consistency * 3.0) -
                                            (candidatePool * 0.5) -
                                            overfitGap;

                                        tested += 1;
                                        if (tested > 0 && tested % 50 === 0) {
                                            await new Promise((resolve) => setTimeout(resolve, 0));
                                        }
                                        if (!best || validationScore > best.validationScore) {
                                            best = {
                                                config,
                                                trainingMetrics: trainingEvaluation.metrics,
                                                trainingResults: trainingEvaluation.results,
                                                validationMetrics: validationEvaluation.metrics,
                                                overfitGap,
                                                validationScore
                                            };
                                        }
                                        if (!aggressiveBest || aggressiveScore > aggressiveBest.aggressiveScore) {
                                            aggressiveBest = {
                                                config,
                                                trainingMetrics: trainingEvaluation.metrics,
                                                trainingResults: trainingEvaluation.results,
                                                validationMetrics: validationEvaluation.metrics,
                                                overfitGap,
                                                validationScore,
                                                aggressiveScore
                                            };
                                        }

                                        if (tested % 200 === 0) {
                                            const progress = ((tested / Math.max(1, totalTests)) * 100).toFixed(1);
                                            const bestRate2 = best ? best.validationMetrics.rate2.toFixed(1) : "0.0";
                                            const bestRate3 = best ? best.validationMetrics.rate3.toFixed(1) : "0.0";
                                            log(`搜尋進度 ${progress}% (${tested}/${totalTests})，最佳驗證 2星 ${bestRate2}% / 3星 ${bestRate3}%`, "gray-400");
                                        }

                                        if (best && best.validationMetrics.rate3 > 55) {
                                            log(`提前終止搜尋：驗證集 3星已達 ${best.validationMetrics.rate3.toFixed(1)}%`, "green-500");
                                            break outerLoop;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }

    if (!best) {
        throw new Error("訓練集樣本不足，無法完成有效參數搜尋。");
    }

    if (
        aggressiveBest &&
        best.validationMetrics.rate3 === 0 &&
        aggressiveBest.validationMetrics.rate3 === 0 &&
        aggressiveBest.validationMetrics.rate2 >= 10 &&
        aggressiveBest.config.windowSize >= best.config.windowSize
    ) {
        best = aggressiveBest;
        log(`啟用衝 3 星模式：改採較長視窗 ${best.config.windowSize} 與較強版路權重。`, "orange-400");
    }

    log(`參數搜尋完成，共測試 ${tested} 組。`, "green-500");
    log(
        `驗證集最佳結果：2星 ${best.validationMetrics.rate2.toFixed(1)}%，3星 ${best.validationMetrics.rate3.toFixed(1)}%，落差 ${best.overfitGap.toFixed(1)}%。`,
        "orange-400"
    );
    return best;
}

function evaluateChronologicalSegment(segment, historyBefore, config, stats) {
    const results = [];
    let hit2 = 0;
    let hit3 = 0;
    let hit4 = 0;
    let hit5 = 0;

    for (let i = 0; i < segment.length; i += 1) {
        const actual = segment[i];
        const historyPool = historyBefore.concat(segment.slice(0, i));
        const minRequiredHistory = historyBefore.length === 0 ? Math.min(config.windowSize, 20) : config.windowSize;
        if (historyPool.length < minRequiredHistory) continue;
        const effectiveWindow = Math.min(config.windowSize, historyPool.length);
        const train = historyPool.slice(-effectiveWindow).reverse();

        const prediction = buildPrediction(train, config, stats, false);
        const hitNums = prediction.filter((num) => actual.nums.includes(num));
        const hits = hitNums.length;

        if (hits >= 2) hit2 += 1;
        if (hits >= 3) hit3 += 1;
        if (hits >= 4) hit4 += 1;
        if (hits >= 5) hit5 += 1;

        results.push({
            label: actual.label,
            actual: actual.nums,
            prediction,
            hits,
            hitNums
        });
    }

    const divisor = results.length || 1;
    const metrics = {
        rate2: (hit2 / divisor) * 100,
        rate3: (hit3 / divisor) * 100,
        rate4: (hit4 / divisor) * 100,
        rate5: (hit5 / divisor) * 100,
        objective: ((hit2 / divisor) * 10) + ((hit3 / divisor) * 50) + ((hit4 / divisor) * 200),
        testCount: results.length
    };

    return { results, metrics };
}

function buildBaseNormalizedScores(train, config) {
    const recencyScores = scoreRecencyModel(train, config.recency);
    const cooccurrenceScores = scoreCooccurrenceModel(train, config.cooccurrence);
    const patternScores = scorePatternModel(train, config.pattern);
    const omissionScores = scoreOmissionModel(train, config.recency.omitThreshold, config.recency.omitWeight);
    const tailScores = scoreTailCycleModel(train, config.tailCycle);
    const zoneScores = scoreZoneBalanceModel(train, config.zoneBalance);

    return {
        recency: normalizeScores(recencyScores),
        cooccurrence: normalizeScores(cooccurrenceScores),
        pattern: normalizeScores(patternScores),
        omission: normalizeScores(omissionScores),
        tail: normalizeScores(tailScores),
        zone: normalizeScores(zoneScores)
    };
}

function buildPrediction(train, config, stats, useFullCombo = false) {
    const combinedScores = buildCombinedScores(train, config);
    const candidatePool = [...combinedScores.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .slice(0, config.candidatePool)
        .map(([num]) => num);

    if (!useFullCombo) {
        const fastPool = candidatePool.slice(0, Math.min(candidatePool.length, 7));
        return selectBestCombination(fastPool, combinedScores, train, stats, config);
    }

    return selectBestCombination(candidatePool, combinedScores, train, stats, config);
}

function buildCombinedScores(train, config) {
    const baseScores = buildBaseNormalizedScores(train, config);
    const consistencyScores = scoreConsistencyModel(train, config);

    const normalizedConsistency = normalizeScores(consistencyScores);

    const combined = new Map();
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const total =
            (baseScores.recency.get(n) * config.scoreWeights.recency) +
            (baseScores.cooccurrence.get(n) * config.scoreWeights.cooccurrence) +
            (baseScores.pattern.get(n) * config.scoreWeights.pattern) +
            (baseScores.omission.get(n) * config.scoreWeights.omission) +
            (baseScores.tail.get(n) * config.scoreWeights.tail) +
            (baseScores.zone.get(n) * config.scoreWeights.zone) +
            (normalizedConsistency.get(n) * config.scoreWeights.consistency);
        combined.set(n, total);
    }
    return combined;
}

function scoreRecencyModel(train, cfg) {
    const scores = createScoreMap();
    const omitMap = getOmissions(train);
    const recent = train.slice(0, Math.min(cfg.depth, train.length));

    recent.forEach((draw, index) => {
        const weight = (recent.length - index) / Math.max(1, recent.length);
        const zoneCount = [0, 0, 0, 0];

        draw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.hotWeight * weight));
            if (num > 1) scores.set(num - 1, scores.get(num - 1) + (cfg.nearWeight * weight));
            if (num < BALL_COUNT) scores.set(num + 1, scores.get(num + 1) + (cfg.nearWeight * weight));
            zoneCount[getZoneIndex(num)] += 1;
        });

        zoneCount.forEach((count, zoneIndex) => {
            if (count >= 2) {
                getZoneNumbers(zoneIndex).forEach((num) => {
                    scores.set(num, scores.get(num) + (cfg.zoneWeight * weight));
                });
            }
        });
    });

    for (let n = 1; n <= BALL_COUNT; n += 1) {
        if (omitMap[n] >= cfg.omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * cfg.omitWeight));
        }
    }

    return scores;
}

function scoreCooccurrenceModel(train, cfg) {
    const scores = createScoreMap();
    const recentUnion = new Set(train.slice(0, cfg.recentDepth).flatMap((draw) => draw.nums));
    const recentTails = new Set([...recentUnion].map((num) => num % 10));
    const recentNumbers = train[0]?.nums || [];

    for (let i = 1; i < Math.min(cfg.depth, train.length); i += 1) {
        const draw = train[i];
        const overlap = draw.nums.filter((num) => recentUnion.has(num)).length;
        if (!overlap) continue;

        const prevDraw = train[i - 1];
        if (!prevDraw) continue;

        prevDraw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (overlap * cfg.overlapWeight));
            if (recentTails.has(num % 10)) {
                scores.set(num, scores.get(num) + cfg.tailWeight);
            }
            const minDistance = Math.min(...recentNumbers.map((value) => Math.abs(value - num)));
            if (minDistance <= 2) {
                scores.set(num, scores.get(num) + cfg.neighborWeight);
            }
        });
    }

    return scores;
}

function scorePatternModel(train, cfg) {
    const scores = createScoreMap();
    const recentSegment = train.slice(0, cfg.segment);
    if (recentSegment.length < cfg.segment) return scores;

    let matches = 0;
    for (let start = 1; start + cfg.segment <= train.length && matches < cfg.maxMatches; start += 1) {
        const candidateSegment = train.slice(start, start + cfg.segment);
        const similarity = compareSegments(recentSegment, candidateSegment);
        if (similarity < cfg.minSimilarity) continue;

        const followDraw = train[start - 1];
        if (!followDraw) continue;

        followDraw.nums.forEach((num) => {
            scores.set(num, scores.get(num) + (cfg.reward * similarity));
        });

        const latest = recentSegment[0].nums;
        followDraw.nums.forEach((num) => {
            const near = Math.min(...latest.map((value) => Math.abs(value - num)));
            scores.set(num, scores.get(num) + ((3 - Math.min(near, 3)) * cfg.offsetWeight));
        });

        matches += 1;
    }

    return scores;
}

function scoreOmissionModel(train, omitThreshold, omitWeight) {
    const scores = createScoreMap();
    const omitMap = getOmissions(train);
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const velocity = getOmissionVelocity(n, train);
        if (omitMap[n] >= omitThreshold) {
            scores.set(n, scores.get(n) + (omitMap[n] * omitWeight));
        }
        scores.set(n, scores.get(n) + velocity);
    }
    return scores;
}

function scoreTailCycleModel(train, cfg) {
    const scores = createScoreMap();
    const recent = train.slice(0, Math.min(cfg.depth, train.length));
    const tailFreq = Array(10).fill(0);
    const tailMiss = Array(10).fill(0);

    recent.forEach((draw) => {
        draw.nums.forEach((num) => {
            tailFreq[num % 10] += 1;
        });
    });

    for (let tail = 0; tail < 10; tail += 1) {
        let miss = 0;
        for (const draw of train) {
            if (draw.nums.some((num) => num % 10 === tail)) break;
            miss += 1;
        }
        tailMiss[tail] = miss;
    }

    const meanFreq = tailFreq.reduce((sum, value) => sum + value, 0) / 10;
    const meanMiss = tailMiss.reduce((sum, value) => sum + value, 0) / 10;

    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const tail = n % 10;
        const freqGap = Math.max(0, meanFreq - tailFreq[tail]);
        const missBoost = Math.max(0, tailMiss[tail] - meanMiss);
        scores.set(n, scores.get(n) + (freqGap * cfg.hotWeight) + (missBoost * cfg.missWeight));
    }

    return scores;
}

function scoreZoneBalanceModel(train, cfg) {
    const scores = createScoreMap();
    const recent = train.slice(0, Math.min(cfg.depth, train.length));
    const zoneCounts = [0, 0, 0, 0];

    recent.forEach((draw) => {
        draw.nums.forEach((num) => {
            zoneCounts[getZoneIndex(num)] += 1;
        });
    });

    const meanCount = zoneCounts.reduce((sum, value) => sum + value, 0) / zoneCounts.length;
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        const zoneIndex = getZoneIndex(n);
        const deficit = Math.max(0, meanCount - zoneCounts[zoneIndex]);
        scores.set(n, scores.get(n) + (deficit * cfg.reward));
    }

    return scores;
}

function scoreConsistencyModel(train, config) {
    const scores = createScoreMap();
    const windows = [20, 25, 30, 35, 40];
    const hitCounts = Array(BALL_COUNT + 1).fill(0);
    const maxWindow = Math.min(40, train.length);
    const baseTrain = train.slice(0, maxWindow);
    if (baseTrain.length < 10) {
        return scores;
    }

    const base = buildBaseNormalizedScores(baseTrain, config);
    const ranked = [];
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        ranked.push({
            num: n,
            score:
                (base.recency.get(n) * config.scoreWeights.recency) +
                (base.cooccurrence.get(n) * config.scoreWeights.cooccurrence) +
                (base.pattern.get(n) * config.scoreWeights.pattern) +
                (base.omission.get(n) * config.scoreWeights.omission) +
                (base.tail.get(n) * config.scoreWeights.tail) +
                (base.zone.get(n) * config.scoreWeights.zone)
        });
    }
    ranked.sort((a, b) => b.score - a.score || a.num - b.num);

    windows.forEach((windowSize, index) => {
        const subset = train.slice(0, Math.min(windowSize, train.length));
        if (subset.length < 10) return;

        const appeared = new Set(subset.flatMap((draw) => draw.nums));
        const decay = 1.25 - (index * 0.1);
        let picked = 0;

        for (const item of ranked) {
            if (!appeared.has(item.num)) continue;
            hitCounts[item.num] += decay;
            picked += 1;
            if (picked >= config.candidatePool) break;
        }
    });

    for (let n = 1; n <= BALL_COUNT; n += 1) {
        scores.set(n, hitCounts[n]);
    }

    return scores;
}

function selectBestCombination(candidatePool, combinedScores, train, stats, config) {
    const ordered = candidatePool.slice().sort((a, b) => (combinedScores.get(b) - combinedScores.get(a)) || a - b);
    if (ordered.length < 5) {
        return [...combinedScores.entries()]
            .sort((a, b) => (b[1] - a[1]) || a[0] - b[0])
            .slice(0, 5)
            .map(([num]) => num)
            .sort((a, b) => a - b);
    }
    const combos = choose(ordered, 5);
    let bestCombo = ordered.slice(0, 5).sort((a, b) => a - b);
    let bestScore = -Infinity;

    combos.forEach((combo) => {
        const sorted = combo.slice().sort((a, b) => a - b);
        const base = sorted.reduce((sum, num) => sum + combinedScores.get(num), 0);
        const penalty = evaluateComboPenalty(sorted, train, stats, config.combo);
        const total = base - penalty;
        if (total > bestScore) {
            bestScore = total;
            bestCombo = sorted;
        }
    });

    return bestCombo;
}

function evaluateComboPenalty(combo, train, stats, comboCfg) {
    const sum = combo.reduce((acc, num) => acc + num, 0);
    const oddCount = combo.filter((num) => num % 2 !== 0).length;
    const spread = combo[combo.length - 1] - combo[0];
    const overlapWithRecent = train[0].nums.filter((num) => combo.includes(num)).length;
    const repeatOverlap = maxHistoricalOverlap(combo, train);
    const tailCounts = Array(10).fill(0);
    const zoneCounts = [0, 0, 0, 0];

    combo.forEach((num) => {
        tailCounts[num % 10] += 1;
        zoneCounts[getZoneIndex(num)] += 1;
    });

    let penalty = 0;
    penalty += deviationPenalty(sum, stats.sum.mean, stats.sum.stdev) * comboCfg.sumWeight;
    penalty += deviationPenalty(oddCount, stats.odd.mean, stats.odd.stdev) * comboCfg.oddWeight;
    penalty += deviationPenalty(spread, stats.spread.mean, stats.spread.stdev) * comboCfg.spreadWeight;
    if (overlapWithRecent >= 4) penalty += (overlapWithRecent - 3) * comboCfg.overlapWeight;
    if (repeatOverlap >= 4) penalty += (repeatOverlap - 3) * 1.2;
    const maxTailCount = Math.max(...tailCounts);
    if (maxTailCount > 3) penalty += (maxTailCount - 3) * comboCfg.tailPenaltyWeight;
    if (zoneCounts.some((count) => count === combo.length)) penalty += comboCfg.zonePenaltyWeight;
    let longestRun = 1;
    let currentRun = 1;
    for (let i = 1; i < combo.length; i += 1) {
        if (combo[i] === combo[i - 1] + 1) {
            currentRun += 1;
            longestRun = Math.max(longestRun, currentRun);
        } else {
            currentRun = 1;
        }
    }
    if (longestRun >= 3) penalty += 0.8;

    return penalty;
}

function deviationPenalty(value, mean, stdev) {
    const safeStdev = Math.max(stdev, 1);
    return Math.abs(value - mean) / safeStdev;
}

function compareSegments(a, b) {
    const aFlat = a.flatMap((draw) => draw.nums);
    const bFlat = b.flatMap((draw) => draw.nums);
    const directOverlap = aFlat.filter((num) => bFlat.includes(num)).length / Math.max(1, aFlat.length);
    const tailOverlap = aFlat.filter((num) => bFlat.some((candidate) => candidate % 10 === num % 10)).length / Math.max(1, aFlat.length);
    const zoneOverlap = aFlat.filter((num) => bFlat.some((candidate) => getZoneIndex(candidate) === getZoneIndex(num))).length / Math.max(1, aFlat.length);
    return (directOverlap * 0.5) + (tailOverlap * 0.2) + (zoneOverlap * 0.3);
}

function maxHistoricalOverlap(combo, train) {
    let maxOverlap = 0;
    train.forEach((draw) => {
        const overlap = draw.nums.filter((num) => combo.includes(num)).length;
        if (overlap > maxOverlap) maxOverlap = overlap;
    });
    return maxOverlap;
}

function createScoreMap() {
    const scores = new Map();
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        scores.set(n, 0);
    }
    return scores;
}

function normalizeScores(scoreMap) {
    const values = [...scoreMap.values()];
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = Math.max(max - min, 1e-9);
    const normalized = new Map();
    scoreMap.forEach((value, key) => {
        normalized.set(key, (value - min) / range);
    });
    return normalized;
}

function getOmissions(history) {
    const omit = {};
    for (let n = 1; n <= BALL_COUNT; n += 1) omit[n] = 0;
    for (let n = 1; n <= BALL_COUNT; n += 1) {
        let gap = 0;
        for (const draw of history) {
            if (draw.nums.includes(n)) break;
            gap += 1;
        }
        omit[n] = gap;
    }
    return omit;
}

function getOmissionVelocity(num, history) {
    const gaps = [];
    let currentGap = 0;

    for (const draw of history) {
        if (draw.nums.includes(num)) {
            gaps.push(currentGap);
            currentGap = 0;
        } else {
            currentGap += 1;
        }
    }

    if (!gaps.length) return 0;
    const avgGap = gaps.reduce((sum, value) => sum + value, 0) / gaps.length;
    const delta = currentGap - avgGap;
    if (Math.abs(delta) <= 1) return 1.4;
    if (delta > 1) return 0.8;
    return 0.2;
}

function calcStats(values) {
    if (!values.length) return { mean: 0, stdev: 1 };
    const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
    const variance = values.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / values.length;
    return { mean, stdev: Math.sqrt(variance) };
}

function getZoneIndex(num) {
    if (num <= 10) return 0;
    if (num <= 20) return 1;
    if (num <= 30) return 2;
    return 3;
}

function getZoneNumbers(zoneIndex) {
    const ranges = [
        [1, 10],
        [11, 20],
        [21, 30],
        [31, 39]
    ];
    const [start, end] = ranges[zoneIndex];
    const nums = [];
    for (let value = start; value <= end; value += 1) nums.push(value);
    return nums;
}

function choose(items, count) {
    const results = [];
    const path = [];

    function backtrack(start) {
        if (path.length === count) {
            results.push(path.slice());
            return;
        }
        for (let i = start; i <= items.length - (count - path.length); i += 1) {
            path.push(items[i]);
            backtrack(i + 1);
            path.pop();
        }
    }

    backtrack(0);
    return results.length ? results : [items.slice(0, count)];
}

function summarizeConfig(config) {
    return [
        `Window ${config.windowSize}`,
        `Pool ${config.candidatePool}`,
        `R/C/P ${config.scoreWeights.recency.toFixed(1)}/${config.scoreWeights.cooccurrence.toFixed(1)}/${config.scoreWeights.pattern.toFixed(1)}`,
        `T/Z/K ${config.scoreWeights.tail.toFixed(1)}/${config.scoreWeights.zone.toFixed(1)}/${config.scoreWeights.consistency.toFixed(1)}`,
        `Seg ${config.pattern.segment}`
    ].join(" | ");
}
    </script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        const MIN_DRAW_COUNT = 30;
        let worker = null;

        function addLog(message, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            const span = document.createElement("span");
            span.className = `text-${color}`;
            span.innerHTML = `&gt; ${message}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function formatNumber(num) {
            return String(num).padStart(2, "0");
        }

        function setStatus(mode, dotClass) {
            document.getElementById("strategyMode").innerText = mode;
            document.getElementById("statusDot").className = dotClass;
        }

        function ensureWorker() {
            if (worker) return worker;

            const source = document.getElementById("worker-source").textContent;
            const blob = new Blob([source], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            worker = new Worker(url);

            worker.onmessage = (event) => {
                const { type, payload } = event.data || {};
                if (type === "log") {
                    addLog(payload.message, payload.color || "gray-500");
                    return;
                }
                if (type === "analysis") {
                    updateUI(payload);
                }
            };

            worker.onerror = (event) => {
                addLog(`Worker 執行錯誤：${event.message || "未知錯誤"}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            worker.onmessageerror = () => {
                addLog("Worker 訊息解析失敗。", "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            };

            addLog("Worker 已建立。", "green-500");
            return worker;
        }

        async function fetchSheetData() {
            addLog("開始同步 Google Sheet 資料...", "orange-500");
            setStatus("SYNC", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                const rawData = typeof result === "string" ? result : (typeof result.data === "string" ? result.data : "");
                if (!rawData.trim()) {
                    throw new Error("API 沒有回傳可用資料。");
                }

                const lines = rawData.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
                const draws = lines
                    .map((line) => {
                        const tokens = line.split(/\s+/);
                        const nums = tokens.slice(-5).map(Number);
                        if (nums.length !== 5 || nums.some((num) => !Number.isInteger(num) || num < 1 || num > 39)) {
                            return null;
                        }
                        if (new Set(nums).size !== 5) {
                            return null;
                        }
                        return { nums };
                    })
                    .filter(Boolean)
                    .reverse()
                    .map((draw, index) => ({
                        label: `第 ${String(index + 1).padStart(3, "0")} 期`,
                        nums: draw.nums
                    }));

                if (draws.length < MIN_DRAW_COUNT) {
                    throw new Error(`有效資料不足 ${MIN_DRAW_COUNT} 期。`);
                }

                addLog(`同步完成，共載入 ${draws.length} 期。`, "green-500");
                ensureWorker().postMessage({ type: "analyze", payload: { draws } });
            } catch (error) {
                addLog(`同步失敗：${error.message}`, "red-500");
                setStatus("ERROR", "w-2 h-2 bg-red-500 rounded-full mr-1");
            }
        }

        function updateUI(payload) {
            const { modelName, configSummary, filterSummary, nextPrediction, metrics, visibleResults, honesty } = payload;

            nextPrediction.forEach((num, index) => {
                document.getElementById(`p${index + 1}`).innerText = num ? formatNumber(num) : "--";
            });

            document.getElementById("hitRate").innerText =
                `測試集 2星/3星/4星/5星：${metrics.rate2.toFixed(1)} / ${metrics.rate3.toFixed(1)} / ${metrics.rate4.toFixed(1)} / ${metrics.rate5.toFixed(1)}`;

            document.getElementById("trainRate").innerText =
                `2星 ${honesty.training.rate2.toFixed(1)}% / 3星 ${honesty.training.rate3.toFixed(1)}%`;
            document.getElementById("testRate").innerText =
                `2星 ${honesty.test.rate2.toFixed(1)}% / 3星 ${honesty.test.rate3.toFixed(1)}%`;

            const warningEl = document.getElementById("overfitWarning");
            if (honesty.warning) {
                warningEl.className = "mt-2 text-[11px] text-red-400 font-bold";
                warningEl.innerText = `過擬合警告：訓練與測試差距 ${honesty.gap.toFixed(1)}%，請降低對命中率的信心`;
            } else {
                warningEl.className = "mt-2 text-[11px] text-green-400";
                warningEl.innerText = `誠實檢查通過：訓練與測試差距 ${honesty.gap.toFixed(1)}%`;
            }

            if (honesty.warning) {
                setStatus("WARNING", "w-2 h-2 bg-red-500 rounded-full mr-1 animate-pulse");
            } else if (metrics.rate2 < 100) {
                setStatus("警戒", "w-2 h-2 bg-red-500 rounded-full mr-1");
            } else if (metrics.rate2 === 100 && metrics.rate3 > 50) {
                setStatus("穩定", "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse");
            } else {
                setStatus("優化中", "w-2 h-2 bg-orange-500 rounded-full mr-1 animate-pulse");
            }

            document.getElementById("modelMeta").innerText =
                `${modelName} | ${configSummary} | ${filterSummary} | 測試樣本 ${metrics.testCount} 期`;

            const rows = visibleResults.length
                ? visibleResults.map((result) => {
                    const hitSet = new Set(result.hitNums);
                    const predictionHtml = result.prediction
                        .map((num) => hitSet.has(num) ? `<span class="hit-num">${formatNumber(num)}</span>` : formatNumber(num))
                        .join(" ");
                    const dotHtml = result.prediction
                        .map((num) => `<span class="slot-dot ${hitSet.has(num) ? "slot-hit" : "slot-miss"}">${hitSet.has(num) ? "●" : "○"}</span>`)
                        .join("");
                    return `
                        <tr class="border-b border-white/5">
                            <td class="py-3 text-gray-500 font-mono">${result.label}</td>
                            <td class="font-mono text-white">${result.actual.map(formatNumber).join(" ")}</td>
                            <td class="text-[11px] text-gray-400 font-mono">${predictionHtml}</td>
                            <td>${dotHtml}</td>
                            <td class="text-right font-black ${result.hits >= 3 ? "text-orange-500" : result.hits >= 2 ? "text-white" : "text-gray-500"}">${result.hits}</td>
                        </tr>
                    `;
                }).join("")
                : `<tr><td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">沒有可顯示的回測資料</td></tr>`;

            document.getElementById("historyTable").innerHTML = rows;
            addLog(`訓練集：2星 ${honesty.training.rate2.toFixed(1)}%，3星 ${honesty.training.rate3.toFixed(1)}%。`, "green-500");
            addLog(`測試集：2星 ${honesty.test.rate2.toFixed(1)}%，3星 ${honesty.test.rate3.toFixed(1)}%。`, honesty.warning ? "red-500" : "orange-400");
            addLog(`下一期推薦：${nextPrediction.map(formatNumber).join(" ")}`, "orange-400");
        }

        ensureWorker();
    </script>
