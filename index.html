<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v8.85 TRIPLE-TRACK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-orange: #f97316; --ios-bg: #000000; --ios-panel: #1c1c1e; }
        body { background-color: var(--ios-bg); color: #fff; font-family: -apple-system, system-ui; overflow-x: hidden; }
        .ios-panel { background: var(--ios-panel); border-radius: 12px; }
        .orange-glow { box-shadow: 0 0 35px rgba(249, 115, 22, 0.3); }
        .btn-active { background: var(--ios-orange); color: #000; font-weight: 700; }
        .btn-inactive { background: #2c2c2e; color: var(--ios-orange); }
        #logBox { font-variant-numeric: tabular-nums; scrollbar-width: none; }
        #logBox::-webkit-scrollbar { display: none; }
        .hit-num { color: #fff; font-weight: 900; background: var(--ios-orange); padding: 1px 4px; border-radius: 4px; }
        .grid-val { text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">ULTIMATE <span class="text-white">EVO 8.85</span></h1>
        <div class="flex bg-[#2c2c2e] p-1 rounded-xl flex-nowrap shrink-0">
            <button id="btnSync" onclick="fetchSheetData()" class="px-4 py-1.5 rounded-lg text-sm btn-active whitespace-nowrap">同步雲端</button>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 orange-glow border border-orange-500/50">
        <div class="flex justify-between items-end mb-2">
            <label class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Panel 1: ENGINE STATUS 數據引擎</label>
            <div class="flex items-center text-[10px] text-orange-500 font-bold uppercase">
                <span id="statusDot" class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span> v8.85 <span id="strategyMode" class="ml-1 text-white">READY</span>
            </div>
        </div>
        <div id="logBox" class="bg-black/50 p-3 rounded-lg text-[11px] h-24 overflow-y-auto font-mono border border-white/5 leading-relaxed">
            <span class="text-gray-500">> 系統初始化完成...</span><br>
            <span class="text-gray-500">> 等待同步指令...</span>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 border-t-2 border-orange-600">
        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-3">Panel 2: HEDGING 狙擊碼位 (三軌核心)</label>
        <div class="grid grid-cols-4 gap-2" id="predictionGrid">
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">強勢軌</div>
                <div class="text-lg font-black text-white grid-val" id="p1">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">連動軌</div>
                <div class="text-lg font-black text-white grid-val" id="p2">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">補償碼</div>
                <div class="text-lg font-black text-white" id="p3">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">對沖碼</div>
                <div class="text-lg font-black text-white" id="p4">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">冷區軌</div>
                <div class="text-lg font-black text-white" id="p5">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">尾數軌</div>
                <div class="text-lg font-black text-white" id="p6">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">共振軌</div>
                <div class="text-lg font-black text-white" id="p7">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">保險軌</div>
                <div class="text-lg font-black text-white" id="p8">--</div>
            </div>
        </div>
    </div>

    <div class="ios-panel p-4 flex-grow overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Panel 3: BACKTEST 滾動回測列表</label>
            <div id="hitRate" class="text-[10px] font-black text-orange-500">HIT RATE: 0.0%</div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-[12px]">
                <thead class="sticky top-0 bg-[#1c1c1e] text-gray-500 z-10">
                    <tr class="text-left border-b border-white/10">
                        <th class="pb-2">日期</th>
                        <th class="pb-2">實際開獎</th>
                        <th class="pb-2">預測組合 (8碼)</th>
                        <th class="pb-2 text-right">星</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="divide-y divide-white/5">
                    <tr><td colspan="4" class="text-center py-10 text-gray-600 font-mono italic">NO DATA SYNCED</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 設定你的 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";

        function addLog(msg, color = "gray-500") {
            const logBox = document.getElementById('logBox');
            const span = document.createElement('span');
            span.className = `text-${color}`;
            span.innerHTML = `> ${msg}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function fetchSheetData() {
            addLog("開始同步雲端數據...", "orange-500");
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                const rawData = typeof result === "string" ? result : result.data;
                
                if (rawData) {
                    addLog("數據獲取成功，啟動解析引擎", "green-500");
                    processData(rawData);
                }
            } catch (error) {
                addLog("連線異常，檢查 API 網址", "red-500");
            }
        }

        function processData(raw) {
            const lines = raw.split(/\r?\n/).filter(line => line.trim() && !line.toLowerCase().includes('date'));
            let history = lines.map(line => {
                const tokens = line.trim().split(/\s+/);
                return {
                    date: tokens[0],
                    nums: tokens.slice(-5).map(Number).sort((a,b)=>a-b)
                };
            });

            // 確保日期由新到舊
            history.sort((a, b) => new Date(b.date) - new Date(a.date));

            // 更新 UI
            runBacktest(history);
        }

        // --- Triple-Track v8.85 演算法核心 ---
        function getUnifiedLogic(historyWindow) {
            // 路徑 A：熱度與鄰碼
            let scores = Array(40).fill(0);
            historyWindow.slice(0, 10).forEach((h, idx) => {
                h.nums.forEach(n => {
                    scores[n] += (10 - idx) * 2; // 越近期分數越高
                    if (n > 1) scores[n-1] += 2;
                    if (n < 39) scores[n+1] += 2;
                });
            });

            // 路徑 B：遺漏震盪
            let gapScores = Array(40).fill(0);
            for(let i=1; i<=39; i++) {
                let gap = 0;
                for(let h of historyWindow) {
                    if(h.nums.includes(i)) break;
                    gap++;
                }
                if(gap > 5 && gap < 15) gapScores[i] += gap * 3;
            }

            // 路徑 C：尾數強度
            let tailMap = Array(10).fill(0);
            historyWindow.slice(0, 5).forEach(h => h.nums.forEach(n => tailMap[n%10]++));

            // 合流計算
            let final = [];
            for(let i=1; i<=39; i++) {
                let total = scores[i] + gapScores[i] + (tailMap[i%10] * 5);
                final.push({ num: i, score: total });
            }

            return final.sort((a,b) => b.score - a.score)
                        .slice(0, 8)
                        .map(x => x.num)
                        .sort((a,b) => a-b);
        }

        function runBacktest(history) {
            let stars3Plus = 0;
            let rowsHtml = "";
            const testRange = Math.min(history.length - 10, 15); // 回測最近 15 期

            for (let i = 0; i < testRange; i++) {
                const trainData = history.slice(i + 1);
                const actual = history[i].nums;
                const prediction = getUnifiedLogic(trainData);
                const hits = actual.filter(n => prediction.includes(n));
                const hitCount = hits.length;

                if (hitCount >= 3) stars3Plus++;

                const predHtml = prediction.map(p => {
                    const pStr = p.toString().padStart(2, '0');
                    return actual.includes(p) ? `<span class="hit-num">${pStr}</span>` : pStr;
                }).join(',');

                rowsHtml += `
                    <tr class="border-b border-white/5">
                        <td class="py-3 text-gray-500 font-mono">${history[i].date.slice(5)}</td>
                        <td class="font-mono text-white">${actual.map(n => n.toString().padStart(2, '0')).join(' ')}</td>
                        <td class="text-[11px] text-gray-400 font-mono">${predHtml}</td>
                        <td class="text-right font-black ${hitCount >= 3 ? 'text-orange-500' : (hitCount >= 2 ? 'text-white' : 'text-gray-700')}">${hitCount}</td>
                    </tr>
                `;
            }

            // 更新預測顯示 (下一期)
            const nextPred = getUnifiedLogic(history);
            nextPred.forEach((num, idx) => {
                document.getElementById(`p${idx + 1}`).innerText = num.toString().padStart(2, '0');
            });

            // 更新數據
            document.getElementById('historyTable').innerHTML = rowsHtml;
            const rate = ((stars3Plus / testRange) * 100).toFixed(1);
            document.getElementById('hitRate').innerText = `HIT RATE (3+): ${rate}%`;
            document.getElementById('strategyMode').innerText = rate > 20 ? 'AGGRESSIVE' : 'SEARCHING';
            
            addLog(`回測完成: 3星命中率 ${rate}%`, "green-500");
        }
    </script>
</body>
</html>
