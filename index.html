<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE EVO v8.86 SLOT ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-orange: #f97316;
            --ios-bg: #000000;
            --ios-panel: #1c1c1e;
        }

        body {
            background-color: var(--ios-bg);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        .ios-panel {
            background: var(--ios-panel);
            border-radius: 12px;
        }

        .orange-glow {
            box-shadow: 0 0 35px rgba(249, 115, 22, 0.3);
        }

        .btn-active {
            background: var(--ios-orange);
            color: #000;
            font-weight: 700;
        }

        #logBox {
            font-variant-numeric: tabular-nums;
            scrollbar-width: none;
        }

        #logBox::-webkit-scrollbar {
            display: none;
        }

        .hit-num {
            color: #fff;
            font-weight: 900;
            background: var(--ios-orange);
            padding: 1px 4px;
            border-radius: 4px;
        }

        .grid-val {
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .slot-dot {
            display: inline-flex;
            width: 18px;
            height: 18px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
            margin-right: 4px;
        }

        .slot-hit {
            background: rgba(34, 197, 94, 0.18);
            color: #4ade80;
        }

        .slot-miss {
            background: rgba(255, 255, 255, 0.08);
            color: #6b7280;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">
            ULTIMATE <span class="text-white">EVO 8.86</span>
        </h1>
        <div class="flex bg-[#2c2c2e] p-1 rounded-xl flex-nowrap shrink-0">
            <button id="btnSync" onclick="fetchSheetData()" class="px-4 py-1.5 rounded-lg text-sm btn-active whitespace-nowrap">
                同步資料
            </button>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 orange-glow border border-orange-500/50">
        <div class="flex justify-between items-end mb-2">
            <label class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">
                Panel 1: Engine Status
            </label>
            <div class="flex items-center text-[10px] text-orange-500 font-bold uppercase">
                <span id="statusDot" class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span>
                v8.86 <span id="strategyMode" class="ml-1 text-white">READY</span>
            </div>
        </div>
        <div id="logBox" class="bg-black/50 p-3 rounded-lg text-[11px] h-24 overflow-y-auto font-mono border border-white/5 leading-relaxed">
            <span class="text-gray-500">&gt; 等待同步 Google Sheet 資料...</span><br>
            <span class="text-gray-500">&gt; 目前模式：Slot 1~5 原始順序分析</span>
        </div>
    </div>

    <div class="ios-panel p-4 mb-4 border-t-2 border-orange-600">
        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-3">
            Panel 2: Prediction Grid (固定選 5 碼 / 原始順序)
        </label>
        <div class="grid grid-cols-5 gap-2" id="predictionGrid">
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">Slot 1</div>
                <div class="text-lg font-black text-white grid-val" id="p1">--</div>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-lg text-center border border-orange-500/40">
                <div class="text-[9px] text-orange-500 font-bold">Slot 2</div>
                <div class="text-lg font-black text-white grid-val" id="p2">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">Slot 3</div>
                <div class="text-lg font-black text-white" id="p3">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">Slot 4</div>
                <div class="text-lg font-black text-white" id="p4">--</div>
            </div>
            <div class="bg-white/5 p-2 rounded-lg text-center border border-white/10">
                <div class="text-[9px] text-gray-400 font-bold">Slot 5</div>
                <div class="text-lg font-black text-white" id="p5">--</div>
            </div>
        </div>
        <div id="modelMeta" class="mt-3 text-[11px] text-gray-500 leading-6">
            等待資料中...
        </div>
    </div>

    <div class="ios-panel p-4 flex-grow overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                Panel 3: Backtest
            </label>
            <div id="hitRate" class="text-[10px] font-black text-orange-500">HIT RATE (3+): 0.0%</div>
        </div>
        <div class="overflow-y-auto flex-grow">
            <table class="w-full text-[12px]">
                <thead class="sticky top-0 bg-[#1c1c1e] text-gray-500 z-10">
                    <tr class="text-left border-b border-white/10">
                        <th class="pb-2">期別</th>
                        <th class="pb-2">實際開獎</th>
                        <th class="pb-2">預測號碼 (5碼)</th>
                        <th class="pb-2">Slot命中</th>
                        <th class="pb-2 text-right">命中</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="divide-y divide-white/5">
                    <tr>
                        <td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">NO DATA SYNCED</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjugTRKA4Jiq6YXSzV-ZWUVS97R6LzL2L7amWb2WOmKEWBlHS8NW90IIPxIaCAnUfH/exec";
        const SLOT_COUNT = 5;
        const WINDOW_SIZE = 12;
        const MAX_BACKTEST = 24;
        const ZONES = [
            { label: "01-12", min: 1, max: 12 },
            { label: "13-24", min: 13, max: 24 },
            { label: "25-39", min: 25, max: 39 }
        ];

        function addLog(msg, color = "gray-500") {
            const logBox = document.getElementById("logBox");
            const span = document.createElement("span");
            span.className = `text-${color}`;
            span.innerHTML = `&gt; ${msg}<br>`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function formatNumber(num) {
            return String(num).padStart(2, "0");
        }

        function setEngineState(text, ok = true) {
            document.getElementById("strategyMode").innerText = text;
            document.getElementById("statusDot").className = ok
                ? "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"
                : "w-2 h-2 bg-red-500 rounded-full mr-1";
        }

        async function fetchSheetData() {
            addLog("開始同步 Google Sheet...", "orange-500");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                const rawData =
                    typeof result === "string"
                        ? result
                        : typeof result.data === "string"
                            ? result.data
                            : "";

                if (!rawData.trim()) {
                    throw new Error("API 沒有回傳可用資料");
                }

                addLog("同步成功，開始重新建立 Slot 模型", "green-500");
                processData(rawData);
            } catch (error) {
                addLog(`同步失敗: ${error.message}`, "red-500");
                setEngineState("ERROR", false);
            }
        }

        function parseHistory(raw) {
            const lines = raw
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter((line) => line && !/^date\b/i.test(line));

            const draws = lines
                .map((line, index) => {
                    const tokens = line.split(/\s+/);
                    let label = "";
                    let nums = [];

                    if (tokens.length >= 6 && /^\d{4}-\d{2}-\d{2}$/.test(tokens[0])) {
                        label = tokens[0];
                        nums = tokens.slice(-5).map(Number);
                    } else if (tokens.length === 5) {
                        label = `第 ${String(index + 1).padStart(3, "0")} 期`;
                        nums = tokens.map(Number);
                    } else {
                        return null;
                    }

                    if (nums.length !== SLOT_COUNT || nums.some((num) => !Number.isInteger(num) || num < 1 || num > 39)) {
                        return null;
                    }

                    if (new Set(nums).size !== SLOT_COUNT) {
                        return null;
                    }

                    return { label, nums };
                })
                .filter(Boolean);

            if (draws.length && /^\d{4}-\d{2}-\d{2}$/.test(draws[0].label)) {
                draws.sort((a, b) => new Date(a.label) - new Date(b.label));
            }

            return draws;
        }

        function processData(raw) {
            const chronological = parseHistory(raw);

            if (chronological.length < WINDOW_SIZE + 1) {
                addLog("資料不足，至少需要 13 期才能回測", "red-500");
                setEngineState("NEED DATA", false);
                return;
            }

            const latestFirst = [...chronological].reverse();
            runBacktest(latestFirst);
        }

        function getZoneIndex(num) {
            return ZONES.findIndex((zone) => num >= zone.min && num <= zone.max);
        }

        function getDrawDelta(nums) {
            const deltas = [];
            for (let i = 0; i < SLOT_COUNT - 1; i += 1) {
                deltas.push(nums[i + 1] - nums[i]);
            }
            return deltas;
        }

        function getOffsetFromPrevious(history, index) {
            if (index + 1 >= history.length) {
                return Array(SLOT_COUNT).fill(0);
            }

            return history[index].nums.map((num, slot) => num - history[index + 1].nums[slot]);
        }

        function buildObservedPatterns(history) {
            const oddEvenSet = new Set();
            const gapSet = new Set();

            history.forEach((draw) => {
                oddEvenSet.add(draw.nums.map((num) => (num % 2 === 0 ? "E" : "O")).join(""));
                gapSet.add(getDrawDelta(draw.nums).map((delta) => Math.max(-9, Math.min(9, delta))).join(","));
            });

            return { oddEvenSet, gapSet };
        }

        function buildEndingChains(historyWindow) {
            const chains = Array.from({ length: SLOT_COUNT - 1 }, () =>
                Array.from({ length: 10 }, () => Array(10).fill(0))
            );

            historyWindow.forEach((draw) => {
                for (let slot = 0; slot < SLOT_COUNT - 1; slot += 1) {
                    const currentTail = draw.nums[slot] % 10;
                    const nextTail = draw.nums[slot + 1] % 10;
                    chains[slot][currentTail][nextTail] += 1;
                }
            });

            return chains;
        }

        function buildFingerprints(historyWindow) {
            return historyWindow.map((draw, index) => ({
                index,
                delta: getDrawDelta(draw.nums),
                offset: getOffsetFromPrevious(historyWindow, index)
            }));
        }

        function compareVectors(a, b, tolerance) {
            let matched = 0;
            for (let i = 0; i < a.length; i += 1) {
                if (Math.abs(a[i] - b[i]) <= tolerance) {
                    matched += 1;
                }
            }
            return matched / a.length;
        }

        function flattenWindow(windowDraws) {
            return windowDraws.flatMap((draw) => draw.nums);
        }

        function calculateSequenceSimilarity(recent, candidate) {
            let score = 0;
            for (let i = 0; i < recent.length; i += 1) {
                if (recent[i] === candidate[i]) {
                    score += 1;
                } else if (getZoneIndex(recent[i]) === getZoneIndex(candidate[i])) {
                    score += 0.7;
                } else if ((recent[i] % 10) === (candidate[i] % 10)) {
                    score += 0.45;
                } else if (Math.abs(recent[i] - candidate[i]) <= 2) {
                    score += 0.25;
                }
            }
            return score / recent.length;
        }

        function findPatternClones(historyWindow, allHistory) {
            const recentWindow = historyWindow.slice(0, 3);
            if (recentWindow.length < 3) {
                return [];
            }

            const recentFlat = flattenWindow(recentWindow);
            const clones = [];

            for (let start = 3; start <= allHistory.length - 4; start += 1) {
                const candidateWindow = allHistory.slice(start, start + 3);
                if (candidateWindow.length < 3) {
                    continue;
                }

                const similarity = calculateSequenceSimilarity(recentFlat, flattenWindow(candidateWindow));
                if (similarity >= 0.62) {
                    clones.push({
                        similarity,
                        nextDraw: allHistory[start - 1]
                    });
                }
            }

            return clones.sort((a, b) => b.similarity - a.similarity).slice(0, 8);
        }

        function scoreSlotCandidates(slot, historyWindow, fingerprints, endingChains, clones) {
            const scoreMap = new Map();
            const slotSeries = historyWindow.map((draw) => draw.nums[slot]);
            const currentValue = slotSeries[0];

            for (let num = 1; num <= 39; num += 1) {
                scoreMap.set(num, 0);
            }

            const zoneCounts = Array(ZONES.length).fill(0);
            slotSeries.slice(0, 6).forEach((num) => {
                zoneCounts[getZoneIndex(num)] += 1;
            });
            const dominantZone = zoneCounts.indexOf(Math.max(...zoneCounts));

            for (let num = 1; num <= 39; num += 1) {
                const zoneIndex = getZoneIndex(num);
                if (zoneIndex === dominantZone) {
                    scoreMap.set(num, scoreMap.get(num) + 12);
                }
            }

            slotSeries.slice(0, 8).forEach((num, idx) => {
                scoreMap.set(num, scoreMap.get(num) + (8 - idx) * 2.2);
            });

            for (let num = 1; num <= 39; num += 1) {
                scoreMap.set(num, scoreMap.get(num) + Math.max(0, 8 - Math.abs(num - currentValue)) * 0.65);
            }

            const currentFingerprint = fingerprints[0];
            fingerprints.slice(1).forEach((fingerprint) => {
                const deltaMatch = compareVectors(currentFingerprint.delta, fingerprint.delta, 1);
                const offsetMatch = compareVectors(currentFingerprint.offset, fingerprint.offset, 2);
                const weight = deltaMatch * 10 + offsetMatch * 8;

                if (weight > 7 && fingerprint.index > 0) {
                    const followUp = historyWindow[fingerprint.index - 1];
                    if (followUp) {
                        const candidate = followUp.nums[slot];
                        scoreMap.set(candidate, scoreMap.get(candidate) + weight);
                    }
                }
            });

            if (slot > 0) {
                const prevTail = historyWindow[0].nums[slot - 1] % 10;
                const tailCounts = endingChains[slot - 1][prevTail];
                for (let num = 1; num <= 39; num += 1) {
                    scoreMap.set(num, scoreMap.get(num) + tailCounts[num % 10] * 1.3);
                }
            }

            clones.forEach((clone, idx) => {
                if (!clone.nextDraw) {
                    return;
                }
                const weight = (clone.similarity * 16) / (idx + 1);
                const candidate = clone.nextDraw.nums[slot];
                scoreMap.set(candidate, scoreMap.get(candidate) + weight);
            });

            const ranked = [];
            for (let num = 1; num <= 39; num += 1) {
                ranked.push({ num, score: scoreMap.get(num) });
            }

            return ranked.sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }
                return a.num - b.num;
            }).slice(0, 6);
        }

        function getPrunePenalty(sequence, observedPatterns) {
            let penalty = 0;
            const oddEven = sequence.map((num) => (num % 2 === 0 ? "E" : "O")).join("");
            const gapPattern = getDrawDelta(sequence).map((delta) => Math.max(-9, Math.min(9, delta))).join(",");

            if (!observedPatterns.oddEvenSet.has(oddEven)) {
                penalty += 12;
            }
            if (!observedPatterns.gapSet.has(gapPattern)) {
                penalty += 16;
            }

            return penalty;
        }

        function buildPrediction(historyWindow, allHistory, observedPatterns) {
            const fingerprints = buildFingerprints(historyWindow);
            const endingChains = buildEndingChains(historyWindow);
            const clones = findPatternClones(historyWindow, allHistory);
            const slotCandidates = [];

            for (let slot = 0; slot < SLOT_COUNT; slot += 1) {
                slotCandidates.push(scoreSlotCandidates(slot, historyWindow, fingerprints, endingChains, clones));
            }

            let beam = [{ sequence: [], score: 0, used: new Set() }];

            slotCandidates.forEach((candidates, slotIndex) => {
                const nextBeam = [];

                beam.forEach((state) => {
                    candidates.forEach((candidate) => {
                        if (state.used.has(candidate.num)) {
                            return;
                        }

                        const sequence = state.sequence.concat(candidate.num);
                        const used = new Set(state.used);
                        used.add(candidate.num);

                        let score = state.score + candidate.score;
                        if (slotIndex > 0) {
                            score -= Math.abs(sequence[slotIndex] - sequence[slotIndex - 1]) * 0.18;
                        }

                        nextBeam.push({ sequence, score, used });
                    });
                });

                beam = nextBeam.sort((a, b) => b.score - a.score).slice(0, 40);
            });

            const scoredBeam = beam.map((state) => ({
                ...state,
                score: state.score - getPrunePenalty(state.sequence, observedPatterns)
            }));

            const best = scoredBeam.sort((a, b) => b.score - a.score)[0];

            return {
                sequence: best.sequence,
                slotCandidates,
                cloneCount: clones.length,
                zoneText: slotCandidates.map((candidates, slot) => {
                    const bestNum = candidates[0].num;
                    return `S${slot + 1}:${ZONES[getZoneIndex(bestNum)].label}`;
                }).join(" | ")
            };
        }

        function updatePredictionGrid(sequence) {
            for (let index = 0; index < SLOT_COUNT; index += 1) {
                document.getElementById(`p${index + 1}`).innerText = formatNumber(sequence[index]);
            }
        }

        function renderBacktestRows(results) {
            const table = document.getElementById("historyTable");

            table.innerHTML = results.length
                ? results.map((result) => `
                    <tr class="border-b border-white/5">
                        <td class="py-3 text-gray-500 font-mono">${result.label}</td>
                        <td class="font-mono text-white">${result.actual.map(formatNumber).join(" ")}</td>
                        <td class="text-[11px] text-gray-400 font-mono">${result.prediction.map((num, idx) => result.slotHits[idx] ? `<span class="hit-num">${formatNumber(num)}</span>` : formatNumber(num)).join(" ")}</td>
                        <td class="text-[11px]">${result.slotHits.map((hit, idx) => `<span class="slot-dot ${hit ? "slot-hit" : "slot-miss"}">${idx + 1}</span>`).join("")}</td>
                        <td class="text-right font-black ${result.hits >= 3 ? "text-orange-500" : result.hits >= 2 ? "text-white" : "text-gray-700"}">${result.hits}</td>
                    </tr>
                `).join("")
                : `
                    <tr>
                        <td colspan="5" class="text-center py-10 text-gray-600 font-mono italic">NOT ENOUGH DATA</td>
                    </tr>
                `;
        }

        function runBacktest(history) {
            const observedPatterns = buildObservedPatterns(history);
            const results = [];
            let stars3Plus = 0;
            const slotTotals = Array(SLOT_COUNT).fill(0);
            const testRange = Math.min(history.length - WINDOW_SIZE - 1, MAX_BACKTEST);

            for (let i = 0; i < testRange; i += 1) {
                const actual = history[i];
                const trainWindow = history.slice(i + 1, i + 1 + WINDOW_SIZE);
                if (trainWindow.length < WINDOW_SIZE) {
                    continue;
                }

                const prediction = buildPrediction(trainWindow, history.slice(i + 1), observedPatterns);
                const slotHits = prediction.sequence.map((num, slot) => num === actual.nums[slot]);
                const hitCount = slotHits.filter(Boolean).length;

                if (hitCount >= 3) {
                    stars3Plus += 1;
                }

                slotHits.forEach((hit, slot) => {
                    if (hit) {
                        slotTotals[slot] += 1;
                    }
                });

                results.push({
                    label: actual.label,
                    actual: actual.nums,
                    prediction: prediction.sequence,
                    slotHits,
                    hits: hitCount
                });
            }

            const nextPrediction = buildPrediction(history.slice(0, WINDOW_SIZE), history, observedPatterns);
            updatePredictionGrid(nextPrediction.sequence);
            renderBacktestRows(results);

            const rate = results.length ? ((stars3Plus / results.length) * 100).toFixed(1) : "0.0";
            document.getElementById("hitRate").innerText = `HIT RATE (3+): ${rate}%`;
            document.getElementById("strategyMode").innerText = Number(rate) >= 20 ? "LOCKED" : "SEARCHING";
            document.getElementById("statusDot").className = "w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse";

            const slotRates = slotTotals
                .map((count, slot) => `S${slot + 1}:${results.length ? ((count / results.length) * 100).toFixed(0) : 0}%`)
                .join(" | ");

            document.getElementById("modelMeta").innerText =
                `Zone bias: ${nextPrediction.zoneText} | Pattern clones: ${nextPrediction.cloneCount} | Slot hit rates: ${slotRates}`;

            addLog(`回測完成，3 星命中率 ${rate}%`, "green-500");
            addLog(`Slot 命中率：${slotRates}`, "orange-400");
            addLog(`下一期預測：${nextPrediction.sequence.map(formatNumber).join(" ")}`, "orange-400");
        }
    </script>
</body>
</html>
